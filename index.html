<!DOCTYPE html>
<html lang="en" data-theme="zhodler">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhodler Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/gridstack.js/12.3.3/gridstack.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gridstack.js/12.3.3/gridstack.all.min.js"></script>
    <style>
/* ── THEMES ──────────────────────────────────────────────────────────────── */
:root,
[data-theme="zhodler"] {
    --bg:     #0f1117;
    --bg2:    #161922;
    --card:   #1e2235;
    --card2:  #252840;
    --border: rgba(255,255,255,0.08);
    --text:   #e8eaef;
    --text2:  #7b82a0;
    --accent: #7c6fef;
    --accent2:#b066ff;
    --green:  #00c896;
    --red:    #ff4d6d;
    --yellow: #ffb84d;
}

[data-theme="cyan"] {
    --bg:     #0a1628;
    --bg2:    #0f1f35;
    --card:   #152a45;
    --card2:  #1a3050;
    --border: rgba(148,163,184,0.15);
    --text:   #f1f5f9;
    --text2:  #94a3b8;
    --accent: #22d3ee;
    --accent2:#3b82f6;
    --green:  #22d3ee;
    --red:    #f87171;
    --yellow: #fbbf24;
}

[data-theme="neon"] {
    --bg:     #0a0a1f;
    --bg2:    #0f0f2a;
    --card:   #1a1a40;
    --card2:  #20204a;
    --border: rgba(167,139,250,0.15);
    --text:   #f8fafc;
    --text2:  #c4b5fd;
    --accent: #c084fc;
    --accent2:#4ade80;
    --green:  #4ade80;
    --red:    #fb7185;
    --yellow: #facc15;
}

[data-theme="cyber"] {
    --bg:     #0c1419;
    --bg2:    #111d24;
    --card:   #1a2f3a;
    --card2:  #1f3a47;
    --border: rgba(94,234,212,0.12);
    --text:   #e2e8f0;
    --text2:  #5eead4;
    --accent: #34d399;
    --accent2:#38bdf8;
    --green:  #34d399;
    --red:    #f87171;
    --yellow: #fde047;
}

/* ── RESET ───────────────────────────────────────────────────────────────── */
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    transition: background .3s, color .3s;
}

body.privacy .sensitive {
    filter: blur(8px);
    pointer-events: none;
    user-select: none;
}

/* ── HEADER ──────────────────────────────────────────────────────────────── */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 200;
    flex-wrap: wrap; gap: 10px;
    backdrop-filter: blur(12px);
}

.brand    { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -.5px; }
.ts       { font-size: 11px; color: var(--text2); margin-left: 10px; }
.hright   { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

.pill {
    padding: 5px 13px; border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card); color: var(--text2);
    cursor: pointer; font-size: 12px; font-weight: 500;
    transition: all .15s; user-select: none;
}
.pill:hover  { border-color: var(--accent); color: var(--accent); }
.pill.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

.ibtn {
    width: 32px; height: 32px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text2); cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; position: relative;
}
.ibtn:hover       { border-color: var(--accent); color: var(--accent); }
.ibtn.active      { border-color: var(--green); color: var(--green); background: rgba(0,200,150,.1); }
.ibtn[title]:hover::after {
    content: attr(title);
    position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 8px; font-size: 11px;
    white-space: nowrap; pointer-events: none; z-index: 300;
    color: var(--text);
}

/* ── THEME SWITCHER ──────────────────────────────────────────────────────── */
.theme-picker {
    display: flex; gap: 5px; align-items: center;
}
.tpill {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer;
    transition: all .15s; flex-shrink: 0;
}
.tpill:hover, .tpill.active { border-color: var(--text); transform: scale(1.2); }
.tpill[data-t="zhodler"] { background: linear-gradient(135deg, #7c6fef, #b066ff); }
.tpill[data-t="cyan"]    { background: linear-gradient(135deg, #22d3ee, #3b82f6); }
.tpill[data-t="neon"]    { background: linear-gradient(135deg, #c084fc, #4ade80); }
.tpill[data-t="cyber"]   { background: linear-gradient(135deg, #34d399, #38bdf8); }

/* ── GRIDSTACK OVERRIDES ─────────────────────────────────────────────────── */
.grid-stack {
    background: transparent;
    padding: 16px;
}

.grid-stack-item-content {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    overflow: auto;
    display: flex;
    flex-direction: column;
    inset: 4px !important; /* inner margin between widgets */
    transition: border-color .2s;
}

/* Edit mode highlight */
body.editing .grid-stack-item-content {
    border-color: var(--accent);
    border-style: dashed;
}
body.editing .grid-stack-item > .ui-resizable-handle {
    opacity: 1;
}

.grid-stack-item > .ui-resizable-se {
    background: var(--accent);
    border-radius: 3px;
    width: 14px; height: 14px;
    right: 6px; bottom: 6px;
    opacity: 0;
    transition: opacity .2s;
}
body.editing .grid-stack-item > .ui-resizable-se { opacity: .6; }
body.editing .grid-stack-item > .ui-resizable-se:hover { opacity: 1; }

/* ── CARD INTERNALS ──────────────────────────────────────────────────────── */
.ctitle {
    font-size: 10px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

/* ── KPI GRID ────────────────────────────────────────────────────────────── */
.krow { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
.kpi  { background: var(--card2); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; }
.klbl { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
.kval { font-size: 16px; font-weight: 700; line-height: 1.2; }
.ksub { font-size: 11px; color: var(--text2); margin-top: 3px; }
.pos  { color: var(--green); }
.neg  { color: var(--red); }
.warn { color: var(--yellow); }

/* Progress bar */
.pbar  { height: 4px; background: var(--bg); border-radius: 2px; margin-top: 7px; overflow: hidden; }
.pfill { height: 100%; background: var(--accent); border-radius: 2px; }

/* ── TABLE ───────────────────────────────────────────────────────────────── */
.twrap { overflow-x: auto; margin-top: 10px; flex-shrink: 0; }
table  { width: 100%; border-collapse: collapse; font-size: 12px; }
th { color: var(--text2); text-align: left; padding: 5px 8px; border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; font-weight: 500; white-space: nowrap; }
td { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,.04); white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.025); }

/* ── CHART ───────────────────────────────────────────────────────────────── */
.chwrap { flex: 1; min-height: 160px; position: relative; }

/* ── STATUS / TOAST ──────────────────────────────────────────────────────── */
.smsg { text-align: center; padding: 60px 20px; color: var(--text2); }
.smsg.err { color: var(--red); }

#toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 16px; font-size: 12px;
    opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 999;
    max-width: 300px;
}
#toast.show     { opacity: 1; }
#toast.toast-ok  { border-color: var(--green); color: var(--green); }
#toast.toast-err { border-color: var(--red);   color: var(--red);   }

/* ── MODAL ───────────────────────────────────────────────────────────────── */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 500; align-items: center; justify-content: center; }
.modal.open { display: flex; }
.mbox    { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 440px; max-width: 95vw; }
.mtitle  { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
.mlabel  { font-size: 11px; color: var(--text2); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: .5px; }
.minput  { width: 100%; padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
.minput:focus { outline: none; border-color: var(--accent); }
.mrow    { margin-bottom: 16px; }
.mactions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
.mprimary { padding: 8px 18px; background: var(--accent); border: none; border-radius: 6px; color: #000; cursor: pointer; font-size: 13px; font-weight: 600; }
.mcancel  { padding: 8px 16px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 13px; }

/* Edit-mode banner */
#editBanner {
    display: none;
    background: var(--accent);
    color: #000; font-size: 12px; font-weight: 600;
    text-align: center; padding: 6px;
    letter-spacing: .5px;
}
body.editing #editBanner { display: block; }

    </style>
</head>
<body>

<!-- EDIT BANNER -->
<div id="editBanner">&#9998; LAYOUT EDIT MODE — Drag to reposition &bull; Resize from bottom-right corner &bull; Click &#10003; when done</div>

<!-- HEADER -->
<div class="header">
    <div style="display:flex;align-items:center;">
        <span class="brand">Zhodler</span>
        <span class="ts">Last updated: <span id="ts">--:--</span></span>
    </div>
    <div class="hright">
        <!-- Filter pills -->
        <div class="pill active" data-filter="portfolio" onclick="setFilter(this)">Total Portfolio</div>
        <div class="pill"        data-filter="crypto"    onclick="setFilter(this)">Crypto</div>
        <div class="pill"        data-filter="tradfi"    onclick="setFilter(this)">TradFi</div>

        <div style="width:1px;height:20px;background:var(--border);margin:0 2px;"></div>

        <!-- Theme switcher -->
        <div class="theme-picker" title="Switch theme">
            <div class="tpill active" data-t="zhodler" onclick="setTheme('zhodler')" title="Zhodler"></div>
            <div class="tpill"        data-t="cyan"    onclick="setTheme('cyan')"    title="Cyan"></div>
            <div class="tpill"        data-t="neon"    onclick="setTheme('neon')"    title="Neon"></div>
            <div class="tpill"        data-t="cyber"   onclick="setTheme('cyber')"   title="Cyber"></div>
        </div>

        <div style="width:1px;height:20px;background:var(--border);margin:0 2px;"></div>

        <!-- Action buttons -->
        <button class="ibtn" id="editBtn"    onclick="toggleEdit()"    title="Customize layout">&#9998;</button>
        <button class="ibtn" id="privacyBtn" onclick="togglePrivacy()" title="Privacy mode">&#128065;</button>
        <button class="ibtn"                 onclick="doRefresh()"      title="Refresh data">&#8635;</button>
        <button class="ibtn"                 onclick="openSettings()"   title="Settings">&#9881;</button>
    </div>
</div>

<!-- GRIDSTACK -->
<div class="grid-stack" id="grid">

    <!-- Widget: Global Metrics -->
    <div class="grid-stack-item" gs-x="0" gs-y="0" gs-w="8" gs-h="2" id="w-global">
        <div class="grid-stack-item-content">
            <div class="ctitle">Global Metrics</div>
            <div class="krow" id="globalKpis"></div>
        </div>
    </div>

    <!-- Widget: BTC Overview -->
    <div class="grid-stack-item" gs-x="8" gs-y="0" gs-w="4" gs-h="2" id="w-btc">
        <div class="grid-stack-item-content">
            <div class="ctitle">BTC Overview</div>
            <div class="krow" id="btcKpis"></div>
        </div>
    </div>

    <!-- Widget: Portfolio Summary -->
    <div class="grid-stack-item" gs-x="0" gs-y="2" gs-w="12" gs-h="3" id="w-summary">
        <div class="grid-stack-item-content">
            <div class="ctitle" id="summaryTitle">Portfolio Summary</div>
            <div class="krow" id="summaryKpis"></div>
        </div>
    </div>

    <!-- Widget: Debt & Liabilities -->
    <div class="grid-stack-item" gs-x="0" gs-y="5" gs-w="6" gs-h="3" id="w-debt">
        <div class="grid-stack-item-content">
            <div class="ctitle">Debt &amp; Liabilities</div>
            <div class="krow" id="debtKpis"></div>
        </div>
    </div>

    <!-- Widget: Projections -->
    <div class="grid-stack-item" gs-x="6" gs-y="5" gs-w="6" gs-h="3" id="w-proj">
        <div class="grid-stack-item-content">
            <div class="ctitle">Projections</div>
            <div class="krow" id="projKpis"></div>
        </div>
    </div>

    <!-- Widget: Assets Distribution -->
    <div class="grid-stack-item" gs-x="0" gs-y="8" gs-w="7" gs-h="5" id="w-assets">
        <div class="grid-stack-item-content">
            <div class="ctitle">Assets Distribution</div>
            <div class="chwrap"><canvas id="assetsChart"></canvas></div>
            <div class="twrap" id="assetsTable"></div>
        </div>
    </div>

    <!-- Widget: Yearly Performance -->
    <div class="grid-stack-item" gs-x="7" gs-y="8" gs-w="5" gs-h="5" id="w-yearly">
        <div class="grid-stack-item-content">
            <div class="ctitle">Yearly Performance</div>
            <div class="chwrap"><canvas id="yearChart"></canvas></div>
            <div class="twrap" id="yearTable"></div>
        </div>
    </div>

</div><!-- /grid -->

<!-- LOADING OVERLAY (shown before first data load) -->
<div id="loadOverlay" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:150;flex-direction:column;gap:12px;">
    <div style="font-size:28px;font-weight:700;color:var(--accent);">Zhodler</div>
    <div style="color:var(--text2);font-size:13px;" id="loadMsg">Loading data&#8230;</div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- SETTINGS MODAL -->
<div class="modal" id="modal">
    <div class="mbox">
        <div class="mtitle">Settings</div>
        <div class="mrow">
            <label class="mlabel">Google Sheet URL or ID</label>
            <input class="minput" id="sheetInput" placeholder="Paste full URL or just the Sheet ID">
        </div>
        <div class="mactions">
            <button class="mcancel"  onclick="closeSettings()">Cancel</button>
            <button class="mprimary" onclick="saveAndReload()">Save &amp; Reload</button>
        </div>
    </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG & STATE
// ─────────────────────────────────────────────────────────────────────────────
const DEFAULT_SHEET = '19FOCRgYHY94QN3Jf7NaeMpGsEbQUdu9bKboYvy4fVpk';
const LS_SHEET      = 'zh-sheet-id';
const LS_LAYOUT     = 'zh-layout-v3';
const LS_THEME      = 'zh-theme';
const LS_PRIVACY    = 'zh-privacy';

let rows        = [];
let activeFilter = 'portfolio';
let charts      = {};
let privacyOn   = false;
let editMode    = false;
let grid        = null;     // GridStack instance

// ─────────────────────────────────────────────────────────────────────────────
// DATA ROW ACCESSORS
// Verified layout (0-indexed) from live Dashboard_Data sheet:
//  0  Days tracking         1  Year % (decimal)
//  2  -- PORTFOLIO --       3  Total Assets         4  Total Invested
//  5  NW Year Start         6  Current NW            7  YTD Gain $
//  8  YTD Gain %            9  Avg Daily YTD         10 Avg Monthly YTD
//  11 All-Time Gain $       12 All-Time Gain %       13 Avg Daily AT
//  14 Avg Monthly AT
//  15 -- HOLDINGS --       16-26 same pattern (LIQUID HOLDINGS)
//  27 Total Crypto Value    28 DeFi Value            29 CeFi Value
//  30 Crypto Invested       31 Crypto NW Start       32 Current Crypto NW
//  33 YTD Gain $            34 YTD Gain %            35 Avg Daily YTD
//  36 Avg Monthly YTD       37 AT Gain $             38 AT Gain %
//  39 Avg Daily AT          40 Avg Monthly AT
//  41 TradFi Assets         42 TradFi Invested       43 TradFi NW Start
//  44 Current TradFi NW     45 YTD Gain $            46 YTD Gain %
//  47 Avg Daily YTD         48 Avg Monthly YTD       49 AT Gain $
//  50 AT Gain %             51 Avg Daily AT           52 Avg Monthly AT
//  53 -- BTC --             54 BTC Holdings          55 BTC Price
//  56 % Since Start         57 % YTD
//  58 -- DEBT --            59 Total Debt            60 Crypto Debt
//  61 Crypto Collateral     62 DeFi Debt             63 DeFi Collateral
//  64 Compound LTV          65 Liq Price             66 CeFi Debt
//  67 CeFi Collateral       68 Bybit LTV             69 TradFi Debt
//  70 Bank Debt             71 Andreia Debt
//  72 -- PROJECTIONS --     73 Portfolio EOY         74 Portfolio 1Y
//  75 Portfolio 5Y          76 Crypto EOY            77 Crypto 1Y
//  78 Crypto 5Y
//  79 -- ASSETS --          80 Header
//  81-92 Assets: c0=name, c1=qty, c2=value(str), c3=type, c4=platform, c5=status
//  93 -- YEARLY --          94 Header
//  95-98 Years: c0=year, c1=NW, c2=YoY%, c3=totalAssets, c4=BTC
// ─────────────────────────────────────────────────────────────────────────────
function V(row, col) {
    col = col === undefined ? 1 : col;
    if (!rows[row]) return null;
    const c = rows[row].c;
    if (!c || c[col] == null) return null;
    return c[col].v !== undefined ? c[col].v : null;
}
function N(row, col) {
    const v = V(row, col);
    if (v === null || v === '') return 0;
    if (typeof v === 'number') return v;
    const n = parseFloat(String(v).replace(/[$,%\s]/g, ''));
    return isNaN(n) ? 0 : n;
}

// ─────────────────────────────────────────────────────────────────────────────
// FORMATTERS
// ─────────────────────────────────────────────────────────────────────────────
function fd(n) {
    const a = Math.abs(n);
    const s = a >= 1e6 ? (a/1e6).toFixed(2)+'M' : a >= 1e3 ? (a/1e3).toFixed(1)+'k' : a.toFixed(2);
    return (n < 0 ? '-$' : '$') + s;
}
function fp(n) {
    if (typeof n === 'string') return n;
    const p = (n > -2 && n < 2) ? n * 100 : n;
    return (p >= 0 ? '+' : '') + p.toFixed(2) + '%';
}
function fq(n) { return n.toLocaleString(undefined, { maximumFractionDigits: 6 }); }
function cc(n) { return n > 0 ? 'pos' : n < 0 ? 'neg' : ''; }
function lc(v) { return v < 0.5 ? 'pos' : v < 0.75 ? 'warn' : 'neg'; }

function kpi(label, val, sub, cls) {
    return `<div class="kpi">
        <div class="klbl">${label}</div>
        <div class="kval ${cls||''} sensitive">${val}</div>
        ${sub ? `<div class="ksub">${sub}</div>` : ''}
    </div>`;
}

function gi(id, html) { document.getElementById(id).innerHTML = html; }

// ─────────────────────────────────────────────────────────────────────────────
// FETCH
// ─────────────────────────────────────────────────────────────────────────────
async function loadData() {
    const id  = localStorage.getItem(LS_SHEET) || DEFAULT_SHEET;
    const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=Dashboard_Data&_t=${Date.now()}`;

    document.getElementById('loadMsg').textContent = 'Loading data\u2026';
    document.getElementById('loadOverlay').style.display = 'flex';

    try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const text = await resp.text();
        const s = text.indexOf('{'), e = text.lastIndexOf('}');
        if (s === -1) throw new Error('Unexpected response format');
        const json = JSON.parse(text.slice(s, e + 1));
        rows = json.table.rows;

        const now = new Date();
        document.getElementById('ts').textContent =
            String(now.getHours()).padStart(2,'0') + ':' +
            String(now.getMinutes()).padStart(2,'0');

        renderAll();
        initGrid();   // ← initialize GridStack AFTER widgets have content

        document.getElementById('loadOverlay').style.display = 'none';
        toast('Data loaded', false);

    } catch (err) {
        console.error(err);
        document.getElementById('loadMsg').innerHTML =
            `<span style="color:var(--red)">&#10005; ${err.message}<br><small>Check Sheet ID and that it is publicly visible.</small></span>`;
        toast('Load failed: ' + err.message, true);
    }
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function renderAll() {
    renderGlobal();
    renderBtc();
    renderSummary();
    renderDebt();
    renderProjections();
    renderAssets();
    renderYearly();
}

function renderGlobal() {
    const days = Math.round(N(0));
    const yr   = N(1);
    gi('globalKpis',
        kpi('Days Tracking', days.toLocaleString()) +
        `<div class="kpi">
            <div class="klbl">Year Progress</div>
            <div class="kval sensitive">${(yr*100).toFixed(1)}%</div>
            <div class="pbar"><div class="pfill" style="width:${Math.min(yr*100,100)}%"></div></div>
        </div>`
    );
}

function renderBtc() {
    const h = N(54), p = N(55), cs = N(56), cy = N(57);
    gi('btcKpis',
        kpi('Holdings',    fq(h) + ' &#x20bf;') +
        kpi('BTC Price',   fd(p)) +
        kpi('BTC Value',   fd(h * p), '', 'sensitive') +
        kpi('Since Start', fp(cs), '', cc(cs)) +
        kpi('YTD Change',  fp(cy), '', cc(cy))
    );
}

function renderSummary() {
    let d, title;
    if (activeFilter === 'portfolio') {
        title = 'Total Portfolio Summary';
        d = { a:N(3), inv:N(4), nws:N(5), nw:N(6), yd:N(7), yp:N(8), dd:N(9), dm:N(10), ad:N(11), ap:N(12), ald:N(13), alm:N(14) };
    } else if (activeFilter === 'crypto') {
        title = 'Crypto Summary';
        d = { a:N(27), inv:N(30), nws:N(31), nw:N(32), yd:N(33), yp:N(34), dd:N(35), dm:N(36), ad:N(37), ap:N(38), ald:N(39), alm:N(40), defi:N(28), cefi:N(29) };
    } else {
        title = 'TradFi Summary';
        d = { a:N(41), inv:N(42), nws:N(43), nw:N(44), yd:N(45), yp:N(46), dd:N(47), dm:N(48), ad:N(49), ap:N(50), ald:N(51), alm:N(52) };
    }
    document.getElementById('summaryTitle').textContent = title;

    let html =
        kpi('Total Assets',            fd(d.a),   '',       'sensitive') +
        kpi('Total Invested',          fd(d.inv), '',       'sensitive') +
        kpi('Current Net Worth',       fd(d.nw),  '',       'sensitive') +
        kpi('YTD Gain / Loss',         fd(d.yd),  fp(d.yp), cc(d.yd)) +
        kpi('All-Time Gain / Loss',    fd(d.ad),  fp(d.ap), cc(d.ad)) +
        kpi('Avg Daily (YTD)',         fd(d.dd),  '',       cc(d.dd)) +
        kpi('Avg Monthly (YTD)',       fd(d.dm),  '',       cc(d.dm)) +
        kpi('Avg Daily (All-Time)',    fd(d.ald), '',       cc(d.ald)) +
        kpi('Avg Monthly (All-Time)',  fd(d.alm), '',       cc(d.alm));
    if (activeFilter === 'crypto') {
        html += kpi('DeFi Value', fd(d.defi), '', 'sensitive') +
                kpi('CeFi Value', fd(d.cefi), '', 'sensitive');
    }
    gi('summaryKpis', html);
}

function renderDebt() {
    let html = '';
    if (activeFilter === 'portfolio') {
        html = kpi('Total Debt',   fd(N(59)), '', 'neg sensitive') +
               kpi('Crypto Debt', fd(N(60)), '', 'sensitive') +
               kpi('TradFi Debt', fd(N(69)), '', 'sensitive');
    } else if (activeFilter === 'crypto') {
        const dl = N(64), cl = N(68);
        html = kpi('Total Crypto Debt',  fd(N(60)), '', 'neg sensitive') +
               kpi('Crypto Collateral', fd(N(61)), '', 'sensitive') +
               kpi('DeFi Debt',         fd(N(62)), '', 'sensitive') +
               kpi('DeFi Collateral',   fd(N(63)), '', 'sensitive') +
               kpi('Compound LTV',      fp(dl).replace('+',''), '', lc(dl)) +
               kpi('Liq. Price',        fd(N(65)), '', 'neg') +
               kpi('CeFi Debt',         fd(N(66)), '', 'sensitive') +
               kpi('CeFi Collateral',   fd(N(67)), '', 'sensitive') +
               kpi('Bybit LTV',         fp(cl).replace('+',''), '', lc(cl));
    } else {
        html = kpi('Total TradFi Debt', fd(N(69)), '', 'neg sensitive') +
               kpi('Bank Debt',         fd(N(70)), '', 'sensitive') +
               kpi('Debt to Andreia',   fd(N(71)), '', 'sensitive');
    }
    gi('debtKpis', html);
}

function renderProjections() {
    let html = '';
    if (activeFilter === 'portfolio') {
        html = kpi('End of Year', fd(N(73)), '', cc(N(73))) +
               kpi('1 Year',     fd(N(74)), '', cc(N(74))) +
               kpi('5 Years',    fd(N(75)), '', cc(N(75)));
    } else if (activeFilter === 'crypto') {
        html = kpi('Crypto EOY', fd(N(76)), '', cc(N(76))) +
               kpi('1 Year',    fd(N(77)), '', cc(N(77))) +
               kpi('5 Years',   fd(N(78)), '', cc(N(78)));
    } else {
        html = `<div class="kpi"><div class="klbl">Note</div>
                <div class="kval" style="font-size:12px;color:var(--text2)">No TradFi projections in sheet</div></div>`;
    }
    gi('projKpis', html);
}

function renderAssets() {
    const assets = [];
    for (let i = 81; i <= 92; i++) {
        const name = V(i, 0);
        if (!name) continue;
        assets.push({ name, qty: N(i,1), val: N(i,2), type: V(i,3)||'', plat: V(i,4)||'', status: V(i,5)||'' });
    }

    const COLORS = ['#7c6fef','#00d4ff','#b066ff','#00c896','#ffb84d','#ff4d6d','#7b82a0','#4a5070','#1c3a5e','#2d5a27','#5e3a1c','#5e1c3a'];
    if (charts.assets) charts.assets.destroy();
    charts.assets = new Chart(document.getElementById('assetsChart'), {
        type: 'doughnut',
        data: {
            labels: assets.map(a => `${a.name} (${a.plat})`),
            datasets: [{ data: assets.map(a => a.val), backgroundColor: COLORS, borderWidth: 1, borderColor: 'rgba(255,255,255,.05)' }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { position:'bottom', labels:{ color:'#7b82a0', font:{size:10}, padding:8, boxWidth:10 } },
                tooltip: { callbacks:{ label: ctx => ` ${ctx.label}: ${fd(ctx.raw)}` } }
            }
        }
    });

    const tbody = assets.map(a => `<tr>
        <td><b>${a.name}</b></td><td>${fq(a.qty)}</td>
        <td class="sensitive">${fd(a.val)}</td>
        <td>${a.type}</td><td>${a.plat}</td><td>${a.status}</td>
    </tr>`).join('');
    gi('assetsTable', `<table>
        <thead><tr><th>Asset</th><th>Qty</th><th>Value</th><th>Type</th><th>Platform</th><th>Status</th></tr></thead>
        <tbody>${tbody}</tbody></table>`);
}

function renderYearly() {
    const years = [];
    for (let i = 95; i <= 98; i++) {
        const yr = V(i, 0);
        if (!yr) continue;
        years.push({ yr, nw: N(i,1), yoy: V(i,2)||'—', ta: N(i,3), btc: N(i,4) });
    }

    if (charts.year) charts.year.destroy();
    charts.year = new Chart(document.getElementById('yearChart'), {
        type: 'bar',
        data: {
            labels: years.map(y => y.yr),
            datasets: [
                { label:'Net Worth',    data: years.map(y => y.nw), backgroundColor:'#7c6fef', borderRadius:4 },
                { label:'Total Assets', data: years.map(y => y.ta), backgroundColor:'rgba(0,212,255,.35)', borderColor:'#00d4ff', borderWidth:1, borderRadius:4 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { labels:{ color:'#7b82a0', font:{size:11} } },
                tooltip: { callbacks:{ label: ctx => ` ${ctx.dataset.label}: ${fd(ctx.raw)}` } }
            },
            scales: {
                x: { ticks:{ color:'#7b82a0' }, grid:{ color:'rgba(255,255,255,.05)' } },
                y: { ticks:{ color:'#7b82a0', callback: v => '$'+(v>=1000?(v/1000).toFixed(0)+'k':v) }, grid:{ color:'rgba(255,255,255,.05)' } }
            }
        }
    });

    const tbody = years.map(y => `<tr>
        <td><b>${y.yr}</b></td>
        <td class="sensitive">${fd(y.nw)}</td>
        <td>${typeof y.yoy === 'number' ? (y.yoy === 0 ? '—' : fp(y.yoy)) : y.yoy}</td>
        <td class="sensitive">${fd(y.ta)}</td>
        <td>${fq(y.btc)} &#x20bf;</td>
    </tr>`).join('');
    gi('yearTable', `<table>
        <thead><tr><th>Year</th><th>Net Worth</th><th>YoY</th><th>Total Assets</th><th>BTC</th></tr></thead>
        <tbody>${tbody}</tbody></table>`);
}

// ─────────────────────────────────────────────────────────────────────────────
// GRIDSTACK — initialized AFTER data is rendered so widgets have real content
// ─────────────────────────────────────────────────────────────────────────────
const DEFAULT_LAYOUT = [
    { id:'w-global',  x:0, y:0,  w:8,  h:2 },
    { id:'w-btc',     x:8, y:0,  w:4,  h:2 },
    { id:'w-summary', x:0, y:2,  w:12, h:3 },
    { id:'w-debt',    x:0, y:5,  w:6,  h:3 },
    { id:'w-proj',    x:6, y:5,  w:6,  h:3 },
    { id:'w-assets',  x:0, y:8,  w:7,  h:5 },
    { id:'w-yearly',  x:7, y:8,  w:5,  h:5 },
];

function initGrid() {
    if (grid) return; // only init once

    grid = GridStack.init({
        column: 12,
        cellHeight: 80,
        margin: 0,            // margins handled by grid-stack-item-content inset
        float: false,
        animate: true,
        disableDrag: true,    // start locked
        disableResize: true,
        resizable: { handles: 'se' },
    }, '#grid');

    grid.on('change', saveLayout);

    // Restore saved layout or use defaults
    const saved = loadLayout();
    if (saved) {
        applyLayout(saved);
    }
}

function applyLayout(items) {
    items.forEach(item => {
        const el = document.getElementById(item.id);
        if (el) grid.update(el, { x: item.x, y: item.y, w: item.w, h: item.h });
    });
}

function saveLayout() {
    if (!grid) return;
    const items = grid.save(false).map(item => ({
        id: item.el.id,
        x: item.x, y: item.y, w: item.w, h: item.h
    }));
    localStorage.setItem(LS_LAYOUT, JSON.stringify(items));
}

function loadLayout() {
    try {
        const s = localStorage.getItem(LS_LAYOUT);
        return s ? JSON.parse(s) : null;
    } catch { return null; }
}

function resetLayout() {
    localStorage.removeItem(LS_LAYOUT);
    applyLayout(DEFAULT_LAYOUT);
    toast('Layout reset', false);
}

// ─────────────────────────────────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────────────────────────────────
function setFilter(el) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    activeFilter = el.dataset.filter;
    if (rows.length > 0) { renderSummary(); renderDebt(); renderProjections(); }
}

function doRefresh() { rows = []; loadData(); }

function togglePrivacy() {
    privacyOn = !privacyOn;
    document.body.classList.toggle('privacy', privacyOn);
    document.getElementById('privacyBtn').classList.toggle('active', privacyOn);
    localStorage.setItem(LS_PRIVACY, privacyOn ? '1' : '0');
}

function toggleEdit() {
    if (!grid) { toast('Load data first', true); return; }
    editMode = !editMode;
    document.body.classList.toggle('editing', editMode);
    document.getElementById('editBtn').classList.toggle('active', editMode);
    if (editMode) {
        grid.enableMove(true);
        grid.enableResize(true);
    } else {
        grid.enableMove(false);
        grid.enableResize(false);
        saveLayout();
        toast('Layout saved', false);
    }
}

function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.querySelectorAll('.tpill').forEach(p => p.classList.toggle('active', p.dataset.t === t));
    localStorage.setItem(LS_THEME, t);
    // Redraw charts with updated colors
    if (rows.length > 0) { renderAssets(); renderYearly(); }
}

// Settings
function openSettings() {
    document.getElementById('sheetInput').value = localStorage.getItem(LS_SHEET) || DEFAULT_SHEET;
    document.getElementById('modal').classList.add('open');
}
function closeSettings() { document.getElementById('modal').classList.remove('open'); }
function saveAndReload() {
    const raw = document.getElementById('sheetInput').value.trim();
    if (!raw) return;
    const m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
    localStorage.setItem(LS_SHEET, m ? m[1] : raw);
    closeSettings();
    grid = null;   // allow grid re-init on reload
    loadData();
}

document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeSettings();
});

// Toast
function toast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + (isErr ? 'toast-err' : 'toast-ok');
    clearTimeout(t._tid);
    t._tid = setTimeout(() => { t.className = ''; }, 3000);
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT — restore saved preferences, then load data
// ─────────────────────────────────────────────────────────────────────────────
(function init() {
    // Theme
    const savedTheme = localStorage.getItem(LS_THEME) || 'zhodler';
    setTheme(savedTheme);

    // Privacy
    if (localStorage.getItem(LS_PRIVACY) === '1') togglePrivacy();

    // Load data (will render + init grid on success)
    loadData();
})();
</script>
