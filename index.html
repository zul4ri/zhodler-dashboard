<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhodler Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg:     #0f1117;
            --bg2:    #161922;
            --card:   #1e2235;
            --card2:  #252840;
            --border: rgba(255,255,255,0.08);
            --text:   #e8eaef;
            --text2:  #7b82a0;
            --accent: #7c6fef;
            --green:  #00c896;
            --red:    #ff4d6d;
            --yellow: #ffb84d;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
        }
        body.privacy .sensitive { filter: blur(8px); pointer-events: none; user-select: none; }

        /* ── HEADER ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            flex-wrap: wrap; gap: 10px;
        }
        .brand { font-size: 22px; font-weight: 700; color: var(--accent); }
        .ts    { font-size: 12px; color: var(--text2); margin-left: 10px; }
        .hright { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        .pill {
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card); color: var(--text2);
            cursor: pointer; font-size: 13px; font-weight: 500;
            transition: all .15s; user-select: none;
        }
        .pill:hover { border-color: var(--accent); color: var(--accent); }
        .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .ibtn {
            width: 34px; height: 34px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--card);
            color: var(--text); cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s;
        }
        .ibtn:hover { border-color: var(--accent); color: var(--accent); }

        /* ── MAIN ── */
        .main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

        .section { margin-bottom: 16px; }

        /* Grid helpers */
        .g2   { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .g3   { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
        .g75  { display: grid; grid-template-columns: 7fr 5fr; gap: 16px; }

        /* ── CARD ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }
        .ctitle {
            font-size: 11px; font-weight: 600; color: var(--text2);
            text-transform: uppercase; letter-spacing: 0.8px;
            margin-bottom: 12px; padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        /* ── KPI ── */
        .krow { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .kpi  { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
        .klbl { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
        .kval { font-size: 17px; font-weight: 700; }
        .ksub { font-size: 11px; color: var(--text2); margin-top: 3px; }
        .pos  { color: var(--green); }
        .neg  { color: var(--red); }
        .warn { color: var(--yellow); }

        /* Progress bar */
        .pbar { height: 5px; background: var(--bg2); border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .pfill { height: 100%; background: var(--accent); border-radius: 3px; }

        /* ── TABLE ── */
        .twrap { overflow-x: auto; margin-top: 12px; }
        table  { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { color: var(--text2); text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        td { padding: 7px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.025); }

        /* ── CHART ── */
        .chwrap { position: relative; height: 220px; margin-bottom: 8px; }

        /* ── STATUS ── */
        .smsg { text-align: center; padding: 48px; color: var(--text2); }
        .smsg.err { color: var(--red); }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--card2); border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 16px; font-size: 13px;
            opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 999;
        }
        #toast.show { opacity: 1; }
        #toast.err  { border-color: var(--red); color: var(--red); }
        #toast.ok   { border-color: var(--green); color: var(--green); }

        /* ── MODAL ── */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 500; align-items: center; justify-content: center; }
        .modal.open { display: flex; }
        .mbox  { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 420px; max-width: 95vw; }
        .mtitle { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .mlabel { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; }
        .minput {
            width: 100%; padding: 8px 12px;
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-size: 13px;
        }
        .minput:focus { outline: none; border-color: var(--accent); }
        .mactions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
        .mprimary { padding: 8px 18px; background: var(--accent); border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: 13px; font-weight: 500; }
        .mcancel  { padding: 8px 16px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 13px; }

        @media (max-width: 900px)  { .g3  { grid-template-columns: 1fr; } }
        @media (max-width: 768px)  { .g2,.g75 { grid-template-columns: 1fr; } .main { padding: 12px; } }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div style="display:flex;align-items:center;">
        <span class="brand">Zhodler</span>
        <span class="ts">Last updated: <span id="ts">--:--</span></span>
    </div>
    <div class="hright">
        <div class="pill active" data-filter="portfolio" onclick="setFilter(this)">Total Portfolio</div>
        <div class="pill"        data-filter="crypto"    onclick="setFilter(this)">Crypto</div>
        <div class="pill"        data-filter="tradfi"    onclick="setFilter(this)">TradFi</div>
        <button class="ibtn" onclick="togglePrivacy()" title="Toggle privacy">&#128065;</button>
        <button class="ibtn" onclick="doRefresh()"     title="Refresh data">&#8635;</button>
        <button class="ibtn" onclick="openSettings()"  title="Settings">&#9881;</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div id="statusWrap"></div>

    <!-- Row 1: Global + BTC -->
    <div class="section g3">
        <div class="card">
            <div class="ctitle">Global Metrics</div>
            <div class="krow" id="globalKpis"></div>
        </div>
        <div class="card">
            <div class="ctitle">BTC Overview</div>
            <div class="krow" id="btcKpis"></div>
        </div>
    </div>

    <!-- Row 2: Portfolio / Crypto / TradFi Summary -->
    <div class="section">
        <div class="card">
            <div class="ctitle" id="summaryTitle">Portfolio Summary</div>
            <div class="krow" id="summaryKpis"></div>
        </div>
    </div>

    <!-- Row 3: Debt + Projections -->
    <div class="section g2">
        <div class="card">
            <div class="ctitle">Debt &amp; Liabilities</div>
            <div class="krow" id="debtKpis"></div>
        </div>
        <div class="card">
            <div class="ctitle">Projections</div>
            <div class="krow" id="projKpis"></div>
        </div>
    </div>

    <!-- Row 4: Assets + Yearly -->
    <div class="section g75">
        <div class="card">
            <div class="ctitle">Assets Distribution</div>
            <div class="chwrap"><canvas id="assetsChart"></canvas></div>
            <div class="twrap" id="assetsTable"></div>
        </div>
        <div class="card">
            <div class="ctitle">Yearly Performance</div>
            <div class="chwrap"><canvas id="yearChart"></canvas></div>
            <div class="twrap" id="yearTable"></div>
        </div>
    </div>

</div><!-- /main -->

<!-- TOAST -->
<div id="toast"></div>

<!-- SETTINGS MODAL -->
<div class="modal" id="modal">
    <div class="mbox">
        <div class="mtitle">Settings</div>
        <label class="mlabel">Google Sheet URL or ID</label>
        <input class="minput" id="sheetInput" placeholder="Paste URL or just the Sheet ID">
        <div class="mactions">
            <button class="mcancel"  onclick="closeSettings()">Cancel</button>
            <button class="mprimary" onclick="saveAndReload()">Save &amp; Reload</button>
        </div>
    </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const DEFAULT_SHEET = '19FOCRgYHY94QN3Jf7NaeMpGsEbQUdu9bKboYvy4fVpk';
const LS_KEY = 'zh-sheet-id';

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let rows = [];
let activeFilter = 'portfolio';
let charts = {};
let privacyOn = false;

// ─────────────────────────────────────────────────────────────────────────────
// ROW HELPERS  (all gviz 0-indexed)
// ─────────────────────────────────────────────────────────────────────────────
// Get raw value at row/col (col defaults to 1 = column B)
function val(row, col) {
    col = (col === undefined) ? 1 : col;
    if (!rows[row]) return null;
    const c = rows[row].c;
    if (!c || c[col] === undefined || c[col] === null) return null;
    return c[col].v !== undefined ? c[col].v : null;
}

// Get numeric value (handles strings like "69015.85", decimals, nulls)
function num(row, col) {
    col = (col === undefined) ? 1 : col;
    const v = val(row, col);
    if (v === null || v === '') return 0;
    if (typeof v === 'number') return v;
    const n = parseFloat(String(v).replace(/[$,%\s]/g, ''));
    return isNaN(n) ? 0 : n;
}

// ─────────────────────────────────────────────────────────────────────────────
// FORMATTERS
// ─────────────────────────────────────────────────────────────────────────────
function fmtDollar(n) {
    const abs = Math.abs(n);
    const s = abs >= 1e6  ? (abs / 1e6).toFixed(2) + 'M'
            : abs >= 1e3  ? (abs / 1e3).toFixed(1) + 'k'
            : abs.toFixed(2);
    return (n < 0 ? '-$' : '$') + s;
}

// n is a raw decimal from the sheet (0.109 = 10.9%) or already a pct string
function fmtPct(n) {
    if (typeof n === 'string') {
        // already formatted like "22.31%"
        return n;
    }
    // decimal form: values between -2 and 2 are treated as decimals
    const pct = (n > -2 && n < 2) ? n * 100 : n;
    return (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
}

function fmtQty(n) {
    return n.toLocaleString(undefined, { maximumFractionDigits: 6 });
}

// Color class
function cc(n) { return n > 0 ? 'pos' : n < 0 ? 'neg' : ''; }

// LTV color
function ltvClass(ltv) {
    if (ltv < 0.5) return 'pos';
    if (ltv < 0.75) return 'warn';
    return 'neg';
}

// ─────────────────────────────────────────────────────────────────────────────
// KPI BUILDER
// ─────────────────────────────────────────────────────────────────────────────
function kpi(label, value, sub, cls) {
    sub = sub || '';
    cls = cls || '';
    return `<div class="kpi">
        <div class="klbl">${label}</div>
        <div class="kval ${cls} sensitive">${value}</div>
        ${sub ? `<div class="ksub">${sub}</div>` : ''}
    </div>`;
}

function inject(id, html) {
    document.getElementById(id).innerHTML = html;
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA FETCH
// Verified row structure from Dashboard_Data sheet (0-indexed):
//
//  0  Days tracking started           (col B = number)
//  1  % of year passed                (col B = decimal, e.g. 0.2657)
//  2  --- PORTFOLIO SUMMARY ---
//  3  Total Assets ($)                PORTFOLIO
//  4  Total Invested ($)              PORTFOLIO
//  5  Net Worth Year Start ($)        PORTFOLIO
//  6  Current Net Worth ($)           PORTFOLIO
//  7  YTD Gain/Loss ($)               PORTFOLIO
//  8  YTD Gain/Loss (%)               PORTFOLIO  (decimal)
//  9  Avg Daily Gain YTD ($)          PORTFOLIO
//  10 Avg Monthly Gain YTD ($)        PORTFOLIO
//  11 All-Time Gain/Loss ($)          PORTFOLIO
//  12 All-Time Gain/Loss (%)          PORTFOLIO  (decimal)
//  13 Avg Daily Gain All-Time ($)     PORTFOLIO
//  14 Avg Monthly Gain All-Time ($)   PORTFOLIO
//  15 Total Holdings Value ($)        LIQUID HOLDINGS
//  16 Total Invested (Holdings)       LIQUID HOLDINGS
//  17-26  ...holdings metrics...
//  27 Total Crypto Value ($)          CRYPTO
//  28 Total DeFi Value ($)            DeFi
//  29 Total CeFi Value ($)            CeFi
//  30 Total Invested (Crypto)         CRYPTO
//  31 Crypto NW Year Start            CRYPTO
//  32 Current Crypto NW               CRYPTO
//  33 YTD Gain/Loss ($)               CRYPTO
//  34 YTD Gain/Loss (%)               CRYPTO  (decimal)
//  35 Avg Daily YTD ($)               CRYPTO
//  36 Avg Monthly YTD ($)             CRYPTO
//  37 All-Time Gain/Loss ($)          CRYPTO
//  38 All-Time Gain/Loss (%)          CRYPTO  (decimal)
//  39 Avg Daily All-Time ($)          CRYPTO
//  40 Avg Monthly All-Time ($)        CRYPTO
//  41 Total TradFi Assets ($)         TRADFI
//  42 Total Invested (TradFi)         TRADFI
//  43 TradFi NW Year Start            TRADFI
//  44 Current TradFi NW               TRADFI
//  45 YTD Gain/Loss ($)               TRADFI
//  46 YTD Gain/Loss (%)               TRADFI  (decimal)
//  47 Avg Daily YTD ($)               TRADFI
//  48 Avg Monthly YTD ($)             TRADFI
//  49 All-Time Gain/Loss ($)          TRADFI
//  50 All-Time Gain/Loss (%)          TRADFI  (decimal)
//  51 Avg Daily All-Time ($)          TRADFI
//  52 Avg Monthly All-Time ($)        TRADFI
//  53 --- BTC ---
//  54 BTC Total Holdings (BTC)
//  55 BTC Price Now ($)
//  56 BTC % Change Since Start        (decimal)
//  57 BTC % Change Current Year       (decimal)
//  58 --- DEBT ---
//  59 Total Portfolio Debt ($)
//  60 Total Crypto Debt ($)
//  61 Total Crypto Collateral ($)
//  62 DeFi Debt ($)
//  63 DeFi Collateral ($)
//  64 DeFi Compound LTV               (decimal)
//  65 Compound Liquidation Price ($)
//  66 CeFi Debt ($)
//  67 CeFi Collateral ($)
//  68 CeFi Bybit LTV                  (decimal)
//  69 Total TradFi Debt ($)
//  70 TradFi Bank Debt ($)
//  71 Debt to Andreia ($)
//  72 --- PROJECTIONS ---
//  73 Portfolio Value EOY ($)
//  74 Portfolio Value 1Y ($)
//  75 Portfolio Value 5Y ($)
//  76 Crypto Value EOY ($)
//  77 Crypto Value 1Y ($)
//  78 Crypto Value 5Y ($)
//  79 --- ASSETS DISTRIBUTION ---
//  80 Header row
//  81-92 Assets: col0=name, col1=qty, col2=value(string), col3=type, col4=platform, col5=status
//  93 --- YEARLY PERFORMANCE ---
//  94 Header row
//  95-98 Years: col0=year, col1=netWorth, col2=YoY%, col3=totalAssets, col4=btcHoldings
// ─────────────────────────────────────────────────────────────────────────────
async function loadData() {
    const sheetId = localStorage.getItem(LS_KEY) || DEFAULT_SHEET;
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Dashboard_Data&_t=${Date.now()}`;

    document.getElementById('statusWrap').innerHTML = '<div class="smsg">Loading data&#8230;</div>';

    try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);

        const text = await resp.text();
        // Strip JSONP wrapper: google.visualization.Query.setResponse({...});
        const start = text.indexOf('{');
        const end   = text.lastIndexOf('}');
        if (start === -1 || end === -1) throw new Error('Unexpected response format');

        const json = JSON.parse(text.slice(start, end + 1));
        rows = json.table.rows;

        document.getElementById('statusWrap').innerHTML = '';

        const now = new Date();
        document.getElementById('ts').textContent =
            String(now.getHours()).padStart(2,'0') + ':' +
            String(now.getMinutes()).padStart(2,'0');

        renderAll();
        showToast('Data loaded', false);

    } catch (e) {
        console.error('loadData error:', e);
        document.getElementById('statusWrap').innerHTML =
            `<div class="smsg err">&#10005; Failed to load data: ${e.message}<br><br>
             <small>Make sure the Google Sheet is publicly accessible (anyone with link can view).<br>
             Sheet ID: ${sheetId}</small></div>`;
        showToast('Load failed: ' + e.message, true);
    }
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER ALL
// ─────────────────────────────────────────────────────────────────────────────
function renderAll() {
    renderGlobal();
    renderBtc();
    renderSummary();
    renderDebt();
    renderProjections();
    renderAssets();
    renderYearly();
}

// ─────────────────────────────────────────────────────────────────────────────
// WIDGETS
// ─────────────────────────────────────────────────────────────────────────────
function renderGlobal() {
    const days = Math.round(num(0));
    const yr   = num(1);  // 0.2657...
    inject('globalKpis',
        kpi('Days Tracking', days.toLocaleString()) +
        `<div class="kpi">
            <div class="klbl">Year Progress</div>
            <div class="kval sensitive">${(yr * 100).toFixed(1)}%</div>
            <div class="pbar"><div class="pfill" style="width:${Math.min(yr*100,100)}%"></div></div>
        </div>`
    );
}

function renderBtc() {
    const holdings = num(54);
    const price    = num(55);
    const chgStart = num(56);  // decimal
    const chgYtd   = num(57);  // decimal
    inject('btcKpis',
        kpi('Holdings',     fmtQty(holdings) + ' &#x20bf;') +
        kpi('BTC Price',    fmtDollar(price)) +
        kpi('BTC Value',    fmtDollar(holdings * price), '', 'sensitive') +
        kpi('Since Start',  fmtPct(chgStart), '', cc(chgStart)) +
        kpi('YTD Change',   fmtPct(chgYtd),   '', cc(chgYtd))
    );
}

function renderSummary() {
    let d, title;

    if (activeFilter === 'portfolio') {
        title = 'Total Portfolio Summary';
        d = {
            assets:  num(3),  invested: num(4),
            nwStart: num(5),  nwNow:    num(6),
            ytdD:    num(7),  ytdP:     num(8),
            dayYtd:  num(9),  moYtd:    num(10),
            atD:     num(11), atP:      num(12),
            dayAt:   num(13), moAt:     num(14),
        };
    } else if (activeFilter === 'crypto') {
        title = 'Crypto Summary';
        d = {
            assets:  num(27), invested: num(30),
            nwStart: num(31), nwNow:    num(32),
            ytdD:    num(33), ytdP:     num(34),
            dayYtd:  num(35), moYtd:    num(36),
            atD:     num(37), atP:      num(38),
            dayAt:   num(39), moAt:     num(40),
            defi:    num(28), cefi:     num(29),
        };
    } else {
        title = 'TradFi Summary';
        d = {
            assets:  num(41), invested: num(42),
            nwStart: num(43), nwNow:    num(44),
            ytdD:    num(45), ytdP:     num(46),
            dayYtd:  num(47), moYtd:    num(48),
            atD:     num(49), atP:      num(50),
            dayAt:   num(51), moAt:     num(52),
        };
    }

    document.getElementById('summaryTitle').textContent = title;

    let html =
        kpi('Total Assets',           fmtDollar(d.assets),   '',           'sensitive') +
        kpi('Total Invested',         fmtDollar(d.invested), '',           'sensitive') +
        kpi('Current Net Worth',      fmtDollar(d.nwNow),    '',           'sensitive') +
        kpi('YTD Gain/Loss',          fmtDollar(d.ytdD),     fmtPct(d.ytdP), cc(d.ytdD)) +
        kpi('All-Time Gain/Loss',     fmtDollar(d.atD),      fmtPct(d.atP),  cc(d.atD)) +
        kpi('Avg Daily (YTD)',        fmtDollar(d.dayYtd),   '',           cc(d.dayYtd)) +
        kpi('Avg Monthly (YTD)',      fmtDollar(d.moYtd),    '',           cc(d.moYtd)) +
        kpi('Avg Daily (All-Time)',   fmtDollar(d.dayAt),    '',           cc(d.dayAt)) +
        kpi('Avg Monthly (All-Time)', fmtDollar(d.moAt),     '',           cc(d.moAt));

    if (activeFilter === 'crypto') {
        html += kpi('DeFi Value', fmtDollar(d.defi), '', 'sensitive') +
                kpi('CeFi Value', fmtDollar(d.cefi), '', 'sensitive');
    }

    inject('summaryKpis', html);
}

function renderDebt() {
    let html = '';

    if (activeFilter === 'portfolio') {
        html =
            kpi('Total Debt',    fmtDollar(num(59)), '', 'neg sensitive') +
            kpi('Crypto Debt',   fmtDollar(num(60)), '', 'sensitive') +
            kpi('TradFi Debt',   fmtDollar(num(69)), '', 'sensitive');

    } else if (activeFilter === 'crypto') {
        const defiLtv  = num(64);
        const cefiLtv  = num(68);
        html =
            kpi('Total Crypto Debt',  fmtDollar(num(60)), '', 'neg sensitive') +
            kpi('Crypto Collateral',  fmtDollar(num(61)), '', 'sensitive') +
            kpi('DeFi Debt',          fmtDollar(num(62)), '', 'sensitive') +
            kpi('DeFi Collateral',    fmtDollar(num(63)), '', 'sensitive') +
            kpi('Compound LTV',       fmtPct(defiLtv).replace('+',''), '', ltvClass(defiLtv)) +
            kpi('Liq. Price',         fmtDollar(num(65)), '', 'neg') +
            kpi('CeFi Debt',          fmtDollar(num(66)), '', 'sensitive') +
            kpi('CeFi Collateral',    fmtDollar(num(67)), '', 'sensitive') +
            kpi('Bybit LTV',          fmtPct(cefiLtv).replace('+',''), '', ltvClass(cefiLtv));

    } else {
        html =
            kpi('Total TradFi Debt',  fmtDollar(num(69)), '', 'neg sensitive') +
            kpi('Bank Debt',          fmtDollar(num(70)), '', 'sensitive') +
            kpi('Debt to Andreia',    fmtDollar(num(71)), '', 'sensitive');
    }

    inject('debtKpis', html);
}

function renderProjections() {
    let html = '';

    if (activeFilter === 'portfolio') {
        html =
            kpi('End of Year', fmtDollar(num(73)), '', cc(num(73))) +
            kpi('1 Year',      fmtDollar(num(74)), '', cc(num(74))) +
            kpi('5 Years',     fmtDollar(num(75)), '', cc(num(75)));

    } else if (activeFilter === 'crypto') {
        html =
            kpi('Crypto EOY', fmtDollar(num(76)), '', cc(num(76))) +
            kpi('1 Year',     fmtDollar(num(77)), '', cc(num(77))) +
            kpi('5 Years',    fmtDollar(num(78)), '', cc(num(78)));

    } else {
        html = '<div class="kpi"><div class="klbl">Note</div><div class="kval" style="font-size:13px;color:var(--text2)">No TradFi projections in sheet</div></div>';
    }

    inject('projKpis', html);
}

function renderAssets() {
    const assets = [];
    for (let i = 81; i <= 92; i++) {
        const name = val(i, 0);
        if (!name) continue;
        assets.push({
            name,
            qty:    num(i, 1),
            value:  num(i, 2),   // stored as string "69015.85" — num() handles it
            type:   val(i, 3) || '',
            plat:   val(i, 4) || '',
            status: val(i, 5) || '',
        });
    }

    // Donut chart
    const COLORS = ['#7c6fef','#00d4ff','#b066ff','#00c896','#ffb84d','#ff4d6d',
                    '#7b82a0','#4a5070','#1c3a5e','#2d5a27','#5e3a1c','#5e1c3a'];
    if (charts.assets) charts.assets.destroy();
    charts.assets = new Chart(document.getElementById('assetsChart'), {
        type: 'doughnut',
        data: {
            labels: assets.map(a => `${a.name} (${a.plat})`),
            datasets: [{
                data: assets.map(a => a.value),
                backgroundColor: COLORS,
                borderWidth: 1,
                borderColor: 'rgba(255,255,255,0.05)',
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { color: '#7b82a0', font: { size: 10 }, padding: 8, boxWidth: 12 }
                },
                tooltip: {
                    callbacks: {
                        label: ctx => ` ${ctx.label}: ${fmtDollar(ctx.raw)}`
                    }
                }
            }
        }
    });

    // Table
    const tbody = assets.map(a => `<tr>
        <td><b>${a.name}</b></td>
        <td>${fmtQty(a.qty)}</td>
        <td class="sensitive">${fmtDollar(a.value)}</td>
        <td>${a.type}</td>
        <td>${a.plat}</td>
        <td>${a.status}</td>
    </tr>`).join('');

    inject('assetsTable', `<table>
        <thead><tr>
            <th>Asset</th><th>Qty</th><th>Value</th>
            <th>Type</th><th>Platform</th><th>Status</th>
        </tr></thead>
        <tbody>${tbody}</tbody>
    </table>`);
}

function renderYearly() {
    // rows 95-98: col0=year, col1=netWorth, col2=YoY(string), col3=totalAssets, col4=btc
    const years = [];
    for (let i = 95; i <= 98; i++) {
        const yr = val(i, 0);
        if (!yr) continue;
        years.push({
            yr,
            nw:  num(i, 1),
            yoy: val(i, 2) || '—',    // string like "22.31%" or number 0
            ta:  num(i, 3),
            btc: num(i, 4),
        });
    }

    if (charts.year) charts.year.destroy();
    charts.year = new Chart(document.getElementById('yearChart'), {
        type: 'bar',
        data: {
            labels: years.map(y => y.yr),
            datasets: [
                {
                    label: 'Net Worth',
                    data: years.map(y => y.nw),
                    backgroundColor: '#7c6fef',
                    borderRadius: 4,
                },
                {
                    label: 'Total Assets',
                    data: years.map(y => y.ta),
                    backgroundColor: '#00d4ff55',
                    borderColor: '#00d4ff',
                    borderWidth: 1,
                    borderRadius: 4,
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#7b82a0', font: { size: 11 } } },
                tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmtDollar(ctx.raw)}` } }
            },
            scales: {
                x: { ticks: { color: '#7b82a0' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                y: {
                    ticks: { color: '#7b82a0', callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(0)+'k' : v) },
                    grid: { color: 'rgba(255,255,255,0.05)' }
                }
            }
        }
    });

    const tbody = years.map(y => `<tr>
        <td><b>${y.yr}</b></td>
        <td class="sensitive">${fmtDollar(y.nw)}</td>
        <td>${typeof y.yoy === 'number' ? (y.yoy === 0 ? '—' : fmtPct(y.yoy)) : y.yoy}</td>
        <td class="sensitive">${fmtDollar(y.ta)}</td>
        <td>${fmtQty(y.btc)} &#x20bf;</td>
    </tr>`).join('');

    inject('yearTable', `<table>
        <thead><tr>
            <th>Year</th><th>Net Worth</th><th>YoY</th>
            <th>Total Assets</th><th>BTC</th>
        </tr></thead>
        <tbody>${tbody}</tbody>
    </table>`);
}

// ─────────────────────────────────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────────────────────────────────
function setFilter(el) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    activeFilter = el.dataset.filter;
    if (rows.length > 0) {
        renderSummary();
        renderDebt();
        renderProjections();
    }
}

function doRefresh() {
    rows = [];
    loadData();
}

function togglePrivacy() {
    privacyOn = !privacyOn;
    document.body.classList.toggle('privacy', privacyOn);
}

// ─────────────────────────────────────────────────────────────────────────────
// SETTINGS
// ─────────────────────────────────────────────────────────────────────────────
function openSettings() {
    document.getElementById('sheetInput').value =
        localStorage.getItem(LS_KEY) || DEFAULT_SHEET;
    document.getElementById('modal').classList.add('open');
}

function closeSettings() {
    document.getElementById('modal').classList.remove('open');
}

function saveAndReload() {
    const raw = document.getElementById('sheetInput').value.trim();
    if (!raw) return;
    const match = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
    const id = match ? match[1] : raw;
    localStorage.setItem(LS_KEY, id);
    closeSettings();
    loadData();
}

document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeSettings();
});

// ─────────────────────────────────────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────────────────────────────────────
function showToast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + (isErr ? 'err' : 'ok');
    setTimeout(() => { t.className = ''; }, 3000);
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
