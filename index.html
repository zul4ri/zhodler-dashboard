<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhodler Dashboard</title>
    <link  href="https://cdn.jsdelivr.net/npm/gridstack@10.0.0/dist/gridstack.min.css" rel="stylesheet">
    <link  href="https://cdn.jsdelivr.net/npm/gridstack@10.0.0/dist/gridstack-extra.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gridstack@10.0.0/dist/gridstack-all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
/* ── THEMES ──────────────────────────────────────────────────────────────── */
:root {
    --bg:     #000000; --bg2:   #080808;
    --card:   #16181e; --card2: #0d0d0d;
    --border: rgba(255,255,255,0.11);
    --text:   #ffffff; --text2: #888888;
    --accent: #ABFF1A; --green: #ABFF1A;
    --red:    #F71F8B; --yellow:#ffcc00;
    --glow:   rgba(171,255,26,0.06);
    --f-port: var(--accent);
    --f-liq:  #00d4ff;
    --f-cryp: #E38215;
    --f-trad: #1FF7F7;
}
.theme-cyan {
    --bg:#000000; --bg2:#040a0e; --card:#060e14; --card2:#0a141c;
    --border:rgba(255,255,255,.10); --text:#ffffff; --text2:#8aacbc;
    --accent:#00d4ff; --green:#00d4ff; --red:#ff6685; --yellow:#ffcc00;
    --glow:rgba(0,212,255,0.06);
}
.theme-neon {
    --bg:#000000; --bg2:#06040f; --card:#0a071a; --card2:#100d22;
    --border:rgba(167,139,250,.12); --text:#ffffff; --text2:#9080cc;
    --accent:#b060ff; --green:#3adf80; --red:#fb7185; --yellow:#facc15;
    --glow:rgba(176,96,255,0.08);
}
.theme-cyber {
    --bg:#000000; --bg2:#04090c; --card:#060e12; --card2:#0a1418;
    --border:rgba(255,255,255,.10); --text:#ffffff; --text2:#4aaa90;
    --accent:#00e5b0; --green:#00e5b0; --red:#ff6685; --yellow:#fde047;
    --glow:rgba(0,229,176,0.06);
}

/* ── RESET ───────────────────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;}
*:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px;}
body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:clamp(11px,1.1vw,14px); min-height:100vh;
}
body.privacy .sensitive{filter:blur(8px);pointer-events:none;user-select:none;}

/* ── TOP HEADER ──────────────────────────────────────────────────────────── */
.header{
    display:flex; align-items:center; justify-content:space-between;
    padding:clamp(8px,1vh,14px) clamp(14px,1.6vw,24px);
    background:var(--bg2); border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:200;
    flex-wrap:wrap; gap:6px;
}
.brand{font-size:clamp(17px,1.9vw,26px);font-weight:900;color:var(--accent);letter-spacing:-0.5px;}
.ts{font-size:clamp(9px,0.82vw,11px);color:var(--text2);margin-left:10px;}
.hright{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sep{width:1px;height:16px;background:var(--border);margin:0 2px;}

.pill{
    padding:clamp(4px,0.5vh,7px) clamp(10px,1.1vw,16px); border-radius:4px;
    border:1px solid var(--border); background:transparent; color:var(--text2);
    cursor:pointer; font-size:clamp(10px,0.92vw,12px); font-weight:500;
    transition:border-color .15s,color .15s; user-select:none; letter-spacing:.3px;
}
.pill:hover{border-color:var(--accent);color:var(--text);}
.pill[data-filter="portfolio"].active{color:#000;font-weight:700;background:var(--f-port);border-color:var(--f-port);}
.pill[data-filter="liquid"].active{color:#000;font-weight:700;background:var(--f-liq);border-color:var(--f-liq);}
.pill[data-filter="crypto"].active{color:#000;font-weight:700;background:var(--f-cryp);border-color:var(--f-cryp);}
.pill[data-filter="tradfi"].active{color:#000;font-weight:700;background:var(--f-trad);border-color:var(--f-trad);}

.ibtn{
    height:clamp(26px,2.8vh,32px); min-width:clamp(26px,2.8vh,32px);
    padding:0 clamp(6px,0.7vw,10px); border-radius:4px;
    border:1px solid var(--border); background:transparent; color:var(--text2);
    cursor:pointer; font-size:clamp(10px,0.9vw,12px); font-weight:500;
    display:flex; align-items:center; gap:4px; white-space:nowrap;
    transition:border-color .15s,color .15s;
}
.ibtn:hover{border-color:var(--accent);color:var(--text);}
.ibtn.on{border-color:var(--green);color:var(--green);}
.ibtn.lock-on{border-color:var(--yellow);color:var(--yellow);}

.tpill{
    width:clamp(13px,1.2vw,17px); height:clamp(13px,1.2vw,17px);
    border-radius:50%; border:2px solid transparent;
    cursor:pointer; transition:transform .2s,border-color .2s; flex-shrink:0;
}
.tpill:hover,.tpill.active{border-color:var(--text);transform:scale(1.3);}
.tpill[data-t="zhodler"]{background:linear-gradient(135deg,#00ff7f,#00c060);}
.tpill[data-t="cyan"]   {background:linear-gradient(135deg,#00d4ff,#2060ee);}
.tpill[data-t="neon"]   {background:linear-gradient(135deg,#b060ff,#3adf80);}
.tpill[data-t="cyber"]  {background:linear-gradient(135deg,#00e5b0,#20b0e0);}

/* ── GRIDSTACK ───────────────────────────────────────────────────────────── */
.grid-stack{background:transparent;}

/* GridStack item: fully transparent — card styling lives only on the content div.
   High-specificity selector overrides any GridStack / jQuery UI defaults. */
.grid-stack > .grid-stack-item,
.grid-stack > .grid-stack-item.ui-draggable,
.grid-stack > .grid-stack-item.ui-resizable,
.grid-stack > .grid-stack-item.ui-draggable-dragging {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    outline: none !important;
}

/* ════════════════════════════════════════════════════════════════════════════
   CARD SHELL  — exact copy of .card from portfolio-card.html
   position:absolute fills the GridStack cell; inset:4px creates the visible
   gap between adjacent cards without using GridStack's margin system (which
   insets content from the item and makes the item itself look like an outer card).
   ════════════════════════════════════════════════════════════════════════════ */
.grid-stack-item-content{
    position: absolute !important;
    inset: 4px !important;           /* 4px gap on every edge → 8px gap between cards */
    display:flex; flex-direction:column;
    overflow:hidden;
    /* visual — identical to portfolio-card */
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px 18px 14px;
    box-shadow:0 4px 24px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.04) inset;
    transition:border-color .2s;
}
.grid-stack-item-content:hover{border-color:rgba(255,255,255,.22);}
body.editing .grid-stack-item-content{border-color:var(--accent);border-style:dashed;}

/* Resize handle */
.grid-stack-item>.ui-resizable-handle{opacity:.25;transition:opacity .2s;}
.grid-stack-item:hover>.ui-resizable-handle{opacity:.65;}
.ui-resizable-se{background:none!important;border:none!important;width:18px!important;height:18px!important;}
.ui-resizable-se::after{
    content:'';position:absolute;bottom:5px;right:5px;
    width:8px;height:8px;
    border-right:2px solid var(--accent);border-bottom:2px solid var(--accent);
    border-radius:0 0 2px 0;
}

/* ════════════════════════════════════════════════════════════════════════════
   CARD HEADER  — exact copy of .card-header from portfolio-card.html
   flex:1  → grows at rate 1
   --sh / --sw written by ResizeObserver; fonts scale to actual section size
   ════════════════════════════════════════════════════════════════════════════ */
.card-header{
    flex:none;              /* fixed — never grows or shrinks */
    height:68px;            /* enough for badge+title+subtitle+gaps (~64px) with breathing room */
    overflow:visible;       /* card shell clips; header never cuts text mid-character */
    display:flex; flex-direction:column;
    align-items:flex-start; justify-content:center;
    --sh:68px; --sw:300px;
    gap:min(calc(var(--sh) * .055), 10px);
    cursor:grab;
}
.card-header:active{cursor:grabbing;}

/* ── Sector label — outlined badge ─────────────────────────────────────── */
.card-label{
    display:inline-flex; align-items:center; align-self:flex-start;
    font-size:min(calc(var(--sh) * .20), calc(var(--sw) * .08));
    font-weight:700; letter-spacing:.11em; text-transform:uppercase;
    color:var(--accent); line-height:1.4; white-space:nowrap;
    border:max(1px, calc(var(--sh) * .022)) solid var(--accent);
    border-radius:min(calc(var(--sh) * .055), 5px);
    padding:.22em .55em;
    transition:color .2s,border-color .2s;
    background:transparent;
}
/* Filter colour overrides (only elements with an id are filter-reactive) */
body[data-filter="portfolio"] .card-label[id]{color:var(--f-port);border-color:var(--f-port);}
body[data-filter="liquid"]    .card-label[id]{color:var(--f-liq); border-color:var(--f-liq);}
body[data-filter="crypto"]    .card-label[id]{color:var(--f-cryp);border-color:var(--f-cryp);}
body[data-filter="tradfi"]    .card-label[id]{color:var(--f-trad);border-color:var(--f-trad);}

/* ── Card title ─────────────────────────────────────────────────────────── */
.card-title{
    font-size:min(calc(var(--sh) * .25), calc(var(--sw) * .09));
    font-weight:600; color:var(--text); letter-spacing:.01em; line-height:1.2; white-space:nowrap;
}

/* ── Card subtitle ──────────────────────────────────────────────────────── */
.card-subtitle{
    font-size:min(calc(var(--sh) * .18), calc(var(--sw) * .065));
    font-weight:500; color:var(--text2); letter-spacing:.09em;
    text-transform:uppercase; white-space:nowrap;
}

/* ════════════════════════════════════════════════════════════════════════════
   CARD DIVIDER  — exact copy of .card-divider from portfolio-card.html
   ════════════════════════════════════════════════════════════════════════════ */
.card-divider{
    height:1px;
    background:linear-gradient(90deg, var(--border) 0%, transparent 100%);
    margin:5px 0; flex-shrink:0;
}

/* ════════════════════════════════════════════════════════════════════════════
   CARD BODY  — exact copy of .card-body from portfolio-card.html
   flex:5  → grows 5× faster than the header
   --sh / --sw written by ResizeObserver
   ════════════════════════════════════════════════════════════════════════════ */
.card-body{
    flex:1;                 /* takes all remaining space after the fixed header */
    min-height:55px; overflow:visible;
    display:flex; flex-direction:column; justify-content:center;
    --sh:55px; --sw:300px;
    gap:min(calc(var(--sh) * .04), 8px);
}
/* Chart/table widgets need scroll and column growth instead of centering */
.card-body.scrollable{overflow:auto; justify-content:flex-start;}

/* ── Main value ─────────────────────────────────────────────────────────── */
.card-main-value{
    font-size:min(calc(var(--sh) * .42), calc(var(--sw) * .15));
    font-weight:700; color:var(--accent); letter-spacing:-.02em; line-height:1; white-space:nowrap;
}
.card-main-value.hero{
    font-size:min(calc(var(--sh) * .52), calc(var(--sw) * .18));
    letter-spacing:-1.5px;
}

/* ── Secondary value ────────────────────────────────────────────────────── */
.card-secondary-value{
    font-size:min(calc(var(--sh) * .18), calc(var(--sw) * .065));
    color:var(--text2); text-transform:uppercase; letter-spacing:.5px; white-space:nowrap;
}

/* colour helpers */
.pos{color:var(--green);} .neg{color:var(--red);} .warn{color:var(--yellow);}

/* ── KPI grid (inside global-metrics card body) ─────────────────────────── */
.krow{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(90px,9.5vw,130px),1fr));gap:clamp(4px,0.5vw,8px);}
.kpi{
    background:var(--card2); border:1px solid var(--border); border-radius:2px;
    padding:clamp(8px,1vh,13px) clamp(9px,1vw,13px); transition:border-color .2s;
    container-type:inline-size;
}
.kpi:hover{border-color:rgba(255,255,255,.22);}
.klbl{font-size:clamp(10px,12cqi,15px);color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;font-weight:600;}
.kval{font-size:clamp(16px,17cqi,32px);font-weight:800;line-height:1.15;letter-spacing:-.3px;}
.ksub{font-size:clamp(11px,10cqi,16px);color:var(--text2);margin-top:4px;}
.pbar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:6px;overflow:hidden;}
.pfill{height:100%;background:var(--accent);border-radius:2px;}

/* ── Table ───────────────────────────────────────────────────────────────── */
.twrap{overflow-x:auto;margin-top:6px;}
table{width:100%;border-collapse:collapse;font-size:clamp(12px,1.2vw,15px);}
th{color:var(--text2);text-align:left;padding:clamp(5px,0.6vh,9px) clamp(8px,0.9vw,12px);
   border-bottom:1px solid var(--border);font-size:clamp(11px,1.05vw,14px);
   text-transform:uppercase;letter-spacing:.7px;font-weight:600;white-space:nowrap;}
td{padding:clamp(6px,0.7vh,10px) clamp(8px,0.9vw,12px);
   border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;font-size:clamp(12px,1.2vw,15px);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.03);}

/* ── Chart wrapper ───────────────────────────────────────────────────────── */
.chwrap{position:relative;min-height:clamp(100px,14vh,140px);flex:1;}

/* ── Monte Carlo ─────────────────────────────────────────────────────────── */
.mc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(4px,0.5vw,7px);margin-bottom:clamp(5px,0.7vh,9px);}
.mc-box{text-align:center;padding:clamp(6px,0.8vh,9px) clamp(3px,0.4vw,6px);
        background:var(--card2);border:1px solid var(--border);border-radius:2px;}
.mc-box .klbl{margin-bottom:4px;font-size:clamp(10px,1.1vw,14px);}
.mc-box .kval{font-size:clamp(14px,1.6vw,20px);font-weight:800;}
.mc-scenarios{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(4px,0.5vw,7px);margin-bottom:clamp(5px,0.7vh,9px);}
.mc-scenario{padding:clamp(6px,0.8vh,9px) clamp(7px,0.8vw,10px);
             background:var(--card2);border:1px solid var(--border);border-radius:2px;}
.mc-scenario-title{font-size:clamp(12px,1.2vw,16px);font-weight:700;margin-bottom:5px;}
.mc-scenario-val{font-size:clamp(11px,1.1vw,15px);color:var(--text2);}

/* ── Milestone ───────────────────────────────────────────────────────────── */
.ms-outer{padding:4px 0;}
.ms-track{position:relative;height:clamp(26px,3.4vh,36px);margin:0 14px;}
.ms-line{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(255,255,255,.08);border-radius:1px;transform:translateY(-50%);z-index:0;}
.ms-fill{position:absolute;top:50%;left:0;height:2px;background:var(--accent);border-radius:1px;transform:translateY(-50%);z-index:1;}
.ms-dots{position:absolute;inset:0;display:flex;justify-content:space-between;align-items:center;z-index:2;}
.ms-circle{width:clamp(20px,2.1vw,28px);height:clamp(20px,2.1vw,28px);border-radius:50%;
           border:2px solid var(--border);background:var(--card);
           display:flex;align-items:center;justify-content:center;
           font-size:clamp(8px,0.9vw,11px);flex-shrink:0;transition:all .25s;}
.ms-circle.done{background:var(--green);border-color:var(--green);color:#000;font-weight:700;}
.ms-circle.next{border-color:var(--accent);box-shadow:0 0 10px color-mix(in srgb,var(--accent) 45%,transparent);}
.ms-labels{display:flex;justify-content:space-between;margin:5px 0 0 0;}
.ms-label{display:flex;flex-direction:column;align-items:center;width:clamp(20px,2.1vw,28px);flex-shrink:0;}
.ms-name{font-size:clamp(6px,0.68vw,9px);color:var(--text2);text-align:center;white-space:nowrap;}
.ms-eta{font-size:clamp(5px,0.62vw,8px);margin-top:1px;text-align:center;}

/* ── Toast ───────────────────────────────────────────────────────────────── */
#toast{
    position:fixed;bottom:20px;right:20px;
    background:var(--card2);border:1px solid var(--border);
    border-radius:4px;padding:10px 16px;font-size:clamp(10px,1vw,12px);
    opacity:0;pointer-events:none;transition:opacity .25s;z-index:999;max-width:280px;
}
#toast.show{opacity:1;}
#toast.ok{border-color:var(--green);color:var(--green);}
#toast.err{border-color:var(--red);color:var(--red);}

/* ── Modal ───────────────────────────────────────────────────────────────── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;align-items:center;justify-content:center;}
.modal.open{display:flex;}
.mbox{background:var(--card2);border:1px solid var(--border);border-radius:4px;padding:clamp(18px,2vw,26px);width:480px;max-width:95vw;}
.mtitle{font-size:clamp(14px,1.4vw,17px);font-weight:700;margin-bottom:18px;}
.mrow{margin-bottom:14px;}
.mlabel{font-size:clamp(9px,0.88vw,11px);color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.7px;font-weight:600;}
.minput{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);font-size:clamp(11px,1.1vw,13px);}
.minput:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent;}
.mactions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
.mprimary{padding:9px 18px;background:var(--accent);border:none;border-radius:3px;color:#000;cursor:pointer;font-size:clamp(11px,1.1vw,13px);font-weight:700;}
.mcancel{padding:9px 16px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--text2);cursor:pointer;font-size:clamp(11px,1.1vw,13px);}
.mgray{padding:9px 16px;background:var(--card);border:1px solid var(--border);border-radius:3px;color:var(--text);cursor:pointer;font-size:clamp(11px,1.1vw,13px);}
.mrow-row{display:flex;gap:8px;flex-wrap:wrap;}

/* ── Loading overlay ─────────────────────────────────────────────────────── */
#loadOverlay{
    position:fixed;inset:0;background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    z-index:300;flex-direction:column;gap:14px;
}
#loadOverlay .brand{font-size:clamp(32px,4vw,52px);}

function N(r,c){const v=V(r,c);if(v===null||v==='')return 0;if(typeof v==='number')return v;const n=parseFloat(String(v).replace(/[$,%\s]/g,''));return isNaN(n)?0:n;}

// ─────────────────────────────────────────────────────────────────────────────
// RESIZE OBSERVER
// Writes --sh (section height px) and --sw (section width px) onto every
// .card-header and .card-body so that CSS min(calc(var(--sh)*f), ...) rules
// scale fonts proportionally to the actual rendered section dimensions.
// ─────────────────────────────────────────────────────────────────────────────
let _sectionRO = null;

function initSectionResizeObserver() {
    if (_sectionRO || typeof ResizeObserver === 'undefined') return;

    _sectionRO = new ResizeObserver(entries => {
        for (const entry of entries) {
            const h = entry.contentRect.height;
            const w = entry.contentRect.width;
            entry.target.style.setProperty('--sh', h + 'px');
            entry.target.style.setProperty('--sw', w + 'px');
        }
    });

    function observeSections(root) {
        const q = root.querySelectorAll ? root : document;
        q.querySelectorAll('.card-header, .card-body').forEach(el => _sectionRO.observe(el));
    }

    observeSections(document);

    new MutationObserver(muts => {
        muts.forEach(m => m.addedNodes.forEach(n => {
            if (!(n instanceof Element)) return;
            observeSections(n);
        }));
    }).observe(document.getElementById('grid') || document.body, {childList:true, subtree:true});
}

// ─────────────────────────────────────────────────────────────────────────────
// FORMATTERS
// ─────────────────────────────────────────────────────────────────────────────
function fd(n){const a=Math.abs(n);const s=a>=1e6?(a/1e6).toFixed(2)+'M':a>=1e3?(a/1e3).toFixed(1)+'k':a.toFixed(2);return(n<0?'-$':'$')+s;}
function fp(n){if(typeof n==='string')return n;const p=(n>-2&&n<2)?n*100:n;return(p>=0?'+':'')+p.toFixed(2)+'%';}
function fq(n){return n.toLocaleString(undefined,{maximumFractionDigits:6});}
function cc(n){return n>0?'pos':n<0?'neg':'';}
function kpi(label,val,sub,cls){return`<div class="kpi"><div class="klbl">${label}</div><div class="kval ${cls||''} sensitive">${val}</div>${sub?`<div class="ksub">${sub}</div>`:''}</div>`;}
function gi(id,html){const el=document.getElementById(id);if(el)el.innerHTML=html;}
function sv(id,val,colorCls){
    const el=document.getElementById(id); if(!el)return;
    el.textContent=val;

// ─────────────────────────────────────────────────────────────────────────────
// WIDGET DEFINITIONS

function _sc(sector, sectorId, title, valId, cls, subId, titleId, subtitle) {

        ? `<span class="card-title" id="${titleId}">${title}</span>`

    const subtitleEl = subtitle ? `<span class="card-subtitle">${subtitle}</span>` : '';
    const valCls = `card-main-value${cls ? ' ' + cls : ''}`;
    const sub = subId ? `<span class="card-secondary-value" id="${subId}"></span>` : '';
    return (
        `<div class="card-header">${label}${titleEl}${subtitleEl}</div>` +
        `<div class="card-divider"></div>` +
        `<div class="card-body" style="align-items:center;text-align:center;">` +
            `<span class="${valCls}" id="${valId}">--</span>${sub}` +

}

// GRIDSTACK INIT

function calcCellHeight() {
    return Math.max(36, Math.min(62, Math.round(window.innerHeight / 20)));
}

function initGrid() {
    if (grid) return;
    if (typeof GridStack === 'undefined') throw new Error('GridStack library failed to load.');

    grid = GridStack.init({
        column: 24,
        cellHeight: calcCellHeight(),
        margin: 0,
        float: true,
        animate: true,
        disableDrag: false,
        disableResize: false,
        resizable: {handles: 'se,s,e,sw,w'},
        draggable: {handle: '.card-header'},
    }, '#grid');

    const layout = loadLayout() || DEFAULT_LAYOUT;
    layout.forEach(item => {
        if (!WIDGET_HTML[item.id]) return;
        grid.addWidget({
            id: item.id, x: item.x, y: item.y, w: item.w, h: item.h,
            content: `<div class="grid-stack-item-content">${WIDGET_HTML[item.id]}</div>`,
        });
    });

    grid.on('change', saveLayout);
    setTimeout(initSectionResizeObserver, 80);

    if (localStorage.getItem(LS.locked) === 'true') applyLock(true, false);

    let _rhTimer;
    window.addEventListener('resize', () => {
        clearTimeout(_rhTimer);
        _rhTimer = setTimeout(() => { if (grid) grid.cellHeight(calcCellHeight()); }, 150);
    });
}

function saveLayout() {
    if (!grid) return;
    const items = grid.getGridItems().map(el => {
        const n = el.gridstackNode;
        return {id: n.id, x: n.x, y: n.y, w: n.w, h: n.h};
    });
    localStorage.setItem(LS.layout, JSON.stringify(items));
}

function loadLayout() {
    try {
        const s = localStorage.getItem(LS.layout);
        if (!s) return null;
        const parsed = JSON.parse(s);
        const validIds = Object.keys(WIDGET_HTML);
        const filtered = parsed.filter(i => validIds.includes(i.id));
        const savedIds = filtered.map(i => i.id);
        const missing  = DEFAULT_LAYOUT.filter(i => !savedIds.includes(i.id));
        const maxY     = filtered.length ? Math.max(...filtered.map(i => i.y + i.h)) : 0;
        missing.forEach((w, idx) => filtered.push({...w, y: maxY + idx * 4}));
        return filtered;
    } catch { return null; }
}

function resetLayout() {
    if (!grid) return;
    localStorage.removeItem(LS.layout);
    grid.removeAll();
    DEFAULT_LAYOUT.forEach(item => {
        grid.addWidget({
            id: item.id, x: item.x, y: item.y, w: item.w, h: item.h,
            content: `<div class="grid-stack-item-content">${WIDGET_HTML[item.id]}</div>`,
        });
    });
    if (rows.length > 0) setTimeout(() => renderAll(), 80);
    toast('Layout reset to default', false);
}

function exportLayout() {
    if (!grid) return;
    const items = grid.getGridItems().map(el => {
        const n = el.gridstackNode;
        return {id: n.id, x: n.x, y: n.y, w: n.w, h: n.h};
    });
    const data = {version:'5', date:new Date().toISOString(),
        theme: document.body.className.replace('privacy','').trim() || 'zhodler',
        locked: isLocked, layout: items};
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(blob),
        download: `zhodler-layout-${new Date().toISOString().slice(0,10)}.json`,
    });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Layout exported', false);
}

function importLayout(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.layout || !Array.isArray(data.layout)) throw new Error('Invalid layout file');
            localStorage.setItem(LS.layout, JSON.stringify(data.layout));
            if (data.theme) setTheme(data.theme);
            grid.removeAll();
            data.layout.forEach(item => {
                if (!WIDGET_HTML[item.id]) return;
                grid.addWidget({
                    id: item.id, x: item.x, y: item.y, w: item.w, h: item.h,
                    content: `<div class="grid-stack-item-content">${WIDGET_HTML[item.id]}</div>`,
                });
            });
            if (data.locked !== undefined) applyLock(data.locked, true);
            if (rows.length > 0) setTimeout(() => renderAll(), 80);
            closeSettings();
            toast('Layout imported', false);
        } catch(err) { toast('Import failed: ' + err.message, true); }
    };
    reader.readAsText(file);
    input.value = '';
}

// DATA FETCH
// ─────────────────────────────────────────────────────────────────────────────
async function loadData() {
    const id  = localStorage.getItem(LS.sheet) || DEFAULT_SHEET;
    const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=Dashboard_Data&_t=${Date.now()}`;
    const isFirstLoad = !grid;

    if (isFirstLoad) {
        document.getElementById('loadMsg').textContent = 'Loading data\u2026';
        document.getElementById('loadOverlay').style.display = 'flex';
    } else {
        document.getElementById('ts').textContent = '⟳ refreshing…';
    }

    let fetchErr = null;
    try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const text = await resp.text();
        const s = text.indexOf('{'), e = text.lastIndexOf('}');
        if (s === -1) throw new Error('Bad response from Google Sheets');
        rows = JSON.parse(text.slice(s, e + 1)).table.rows;
    } catch(err) { fetchErr = err; }

    let gridErr = null;
    try { initGrid(); } catch(err) { gridErr = err; }

    if (gridErr) {
        document.getElementById('loadMsg').innerHTML =
            `<span style="color:var(--red)">&#10005; ${gridErr.message}</span>`;
        toast(gridErr.message, true);
        return;
    }
    if (fetchErr) {
        if (isFirstLoad) document.getElementById('loadOverlay').style.display = 'none';
        document.getElementById('ts').textContent = 'error';
        toast('Data load failed: ' + fetchErr.message, true);
        return;
    }

    const now = new Date();
    document.getElementById('ts').textContent =
        String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    try { renderAll(); } catch(err) { console.error('renderAll error:', err); }
    if (isFirstLoad) document.getElementById('loadOverlay').style.display = 'none';
    toast('Data refreshed', false);
}

function renderMilestone() {
    const currentNW=getFilterNW(), monthlyGrowth=getFilterMonthly();
    const milestones=[
        {name:'$50K', target:50000,  icon:'🎯'},
        {name:'$100K',target:100000, icon:'💯'},
        {name:'$150K',target:150000, icon:'🚀'},
        {name:'$250K',target:250000, icon:'⭐'},
        {name:'$500K',target:500000, icon:'💎'},
        {name:'$750K',target:750000, icon:'👑'},
        {name:'$1M',  target:1000000,icon:'🏆'},
    ];
    const nextIdx = milestones.findIndex(m => currentNW < m.target);
    const n = milestones.length;
    let visualPct;
    if (nextIdx === -1) {
        visualPct = 100;
    } else if (nextIdx === 0) {
        visualPct = Math.max(0, (currentNW / milestones[0].target) * (100 / (n-1)));
    } else {
        const prevM=milestones[nextIdx-1], nextM=milestones[nextIdx];
        const segFrac=(currentNW-prevM.target)/(nextM.target-prevM.target);
        visualPct=((nextIdx-1+segFrac)/(n-1))*100;
    }
    const fill=document.getElementById('ms-fill');
    if (fill) fill.style.width = visualPct+'%';
    gi('ms-dots', milestones.map((m,i)=>{
        const done=currentNW>=m.target, isNext=i===nextIdx;
        return `<div class="ms-circle${done?' done':isNext?' next':''}" title="${m.name}">${done?'✓':m.icon}</div>`;
    }).join(''));
    gi('ms-labels', milestones.map(m=>{
        const done=currentNW>=m.target;
        const months=(!done&&monthlyGrowth>0)?Math.ceil((m.target-currentNW)/monthlyGrowth):0;
        const eta=done?'':(months>0?months+'mo':'∞');
        const etaColor=done?'var(--green)':(months>0&&months<24?'var(--yellow)':'var(--text2)');
        return `<div class="ms-label"><div class="ms-name">${m.name}</div><div class="ms-eta" style="color:${etaColor}">${eta}</div></div>`;
    }).join(''));
    const next=nextIdx>=0?milestones[nextIdx]:null;
    const remainToNext=next?next.target-currentNW:0;
    const moToNext=(next&&monthlyGrowth>0)?Math.ceil(remainToNext/monthlyGrowth):0;
    const nextStr=next?` &bull; Next: ${next.name} in ${moToNext>0?moToNext+'mo':'∞'}`:' &bull; 🏆 All milestones reached!';
    gi('ms-status', `NW: ${fd(currentNW)} &bull; ${Math.min(100,(currentNW/1000000)*100).toFixed(1)}% of $1M goal${nextStr}`);
}

function renderMonteCarlo() {
    const statsEl=document.getElementById('mc-stats'); if(!statsEl) return;
    const currentNW=getFilterNW(), monthly=getFilterMonthly(), atPct=getFilterAtPct();
    const FIRE_TARGET=1000000, SIMS=800, YEARS=15;
    if (currentNW<=0) {
        gi('mc-stats',`<div style="color:var(--text2);text-align:center;padding:20px;grid-column:1/-1">Insufficient data</div>`);
        gi('mc-scenarios',''); return;
    }
    const annualReturn=Math.max(0.04,Math.min(0.5,Math.abs(atPct>0?atPct:0.08)));
    const meanMonthly=annualReturn/12, vol=0.045;
    const tracks=[], fireYrs=[];
    for (let sim=0;sim<SIMS;sim++) {
        let value=currentNW, fireYr=null;
        const track=[value];
        for (let mo=0;mo<YEARS*12;mo++) {
            const u1=Math.random(), u2=Math.random();
            const z=Math.sqrt(-2*Math.log(u1||1e-10))*Math.cos(2*Math.PI*u2);
            value=value*(1+meanMonthly+z*vol)+monthly;
            if((mo+1)%12===0) track.push(Math.max(0,value));
            if(value>=FIRE_TARGET&&fireYr===null) fireYr=(mo+1)/12;
        }
        tracks.push(track);
        if(fireYr!==null) fireYrs.push(fireYr);
    }
    function pct(arr,p){const s=[...arr].sort((a,b)=>a-b);return s[Math.floor(s.length*p)];}
    const finals=tracks.map(t=>t[YEARS]);
    const p10=pct(finals,.10),p25=pct(finals,.25),p50=pct(finals,.50),p75=pct(finals,.75),p90=pct(finals,.90);
    const fireProb=(fireYrs.length/SIMS*100).toFixed(0);
    const medianFire=fireYrs.length>0?pct(fireYrs,.5).toFixed(1):'--';
    const bestFire=fireYrs.length>0?Math.min(...fireYrs).toFixed(1):'--';
    gi('mc-stats',`
        <div class="mc-box"><div class="klbl">Bear (P10)</div><div class="kval neg">${fd(p10)}</div></div>
        <div class="mc-box"><div class="klbl">Cautious (P25)</div><div class="kval warn">${fd(p25)}</div></div>
        <div class="mc-box"><div class="klbl">Median (P50)</div><div class="kval pos">${fd(p50)}</div></div>
        <div class="mc-box"><div class="klbl">Bull (P90)</div><div class="kval" style="color:var(--accent)">${fd(p90)}</div></div>
        <div class="mc-box"><div class="klbl">FIRE Probability</div><div class="kval ${parseFloat(fireProb)>50?'pos':'warn'}">${fireProb}%</div></div>
        <div class="mc-box"><div class="klbl">Median FIRE</div><div class="kval">${medianFire==='--'?'—':medianFire+' yrs'}</div></div>
        <div class="mc-box"><div class="klbl">Best-Case FIRE</div><div class="kval pos">${bestFire==='--'?'—':bestFire+' yrs'}</div></div>
        <div class="mc-box"><div class="klbl">Simulations</div><div class="kval">${SIMS.toLocaleString()}</div></div>
    `);
    const bearAnnual=Math.max(0.01,annualReturn*0.4), bullAnnual=Math.min(0.6,annualReturn*1.8);
    function projFinal(ar){let v=currentNW;const mm=ar/12;for(let mo=0;mo<YEARS*12;mo++)v=v*(1+mm)+monthly;return v;}
    gi('mc-scenarios',`
        <div class="mc-scenario"><div class="mc-scenario-title" style="color:var(--red)">🐻 Bear (${(bearAnnual*100).toFixed(0)}%/yr)</div><div class="mc-scenario-val">Final: <b>${fd(projFinal(bearAnnual))}</b></div></div>
        <div class="mc-scenario"><div class="mc-scenario-title" style="color:var(--green)">📈 Base (${(annualReturn*100).toFixed(0)}%/yr)</div><div class="mc-scenario-val">Final: <b>${fd(projFinal(annualReturn))}</b></div></div>
        <div class="mc-scenario"><div class="mc-scenario-title" style="color:var(--accent)">🚀 Bull (${(bullAnnual*100).toFixed(0)}%/yr)</div><div class="mc-scenario-val">Final: <b>${fd(projFinal(bullAnnual))}</b></div></div>
    `);
    gi('mc-footer',`${YEARS}-yr horizon &bull; Monthly contrib: ${fd(monthly)} &bull; Base return: ~${(annualReturn*100).toFixed(0)}%/yr &bull; Vol: 4.5%/mo`);
    gi('mc-params',`Target $1M`);
    const yearLabels=Array.from({length:YEARS+1},(_,i)=>i===0?'Now':`Y${i}`);
    const p10s=yearLabels.map((_,yi)=>pct(tracks.map(t=>t[yi]),.10));
    const p50s=yearLabels.map((_,yi)=>pct(tracks.map(t=>t[yi]),.50));
    const p90s=yearLabels.map((_,yi)=>pct(tracks.map(t=>t[yi]),.90));
    const fireTargetLine=yearLabels.map(()=>FIRE_TARGET);
    if(charts.monte) charts.monte.destroy();
    const ctx=document.getElementById('mcChart');
    if(ctx) {
        charts.monte=new Chart(ctx,{
            type:'line',
            data:{labels:yearLabels,datasets:[
                {label:'P90 (Bull)',data:p90s,borderColor:'rgba(124,111,239,.8)',backgroundColor:'rgba(124,111,239,.12)',fill:'+1',borderWidth:1.5,pointRadius:0,tension:0.4},
                {label:'P50 (Median)',data:p50s,borderColor:'#00c896',backgroundColor:'rgba(0,200,150,.08)',fill:'+1',borderWidth:2.5,pointRadius:0,tension:0.4},
                {label:'P10 (Bear)',data:p10s,borderColor:'rgba(255,77,109,.7)',backgroundColor:'transparent',fill:false,borderWidth:1.5,borderDash:[4,3],pointRadius:0,tension:0.4},
                {label:'$1M FIRE Target',data:fireTargetLine,borderColor:'rgba(255,184,77,.6)',backgroundColor:'transparent',fill:false,borderWidth:1,borderDash:[6,4],pointRadius:0},
            ]},
            options:{
                responsive:true,maintainAspectRatio:false,
                interaction:{mode:'index',intersect:false},
                plugins:{
                    legend:{display:true,position:'bottom',labels:{color:'#7b82a0',font:{size:10},boxWidth:12,padding:8}},
                    tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fd(ctx.raw)}`}}
                },
                scales:{
                    x:{ticks:{color:'#7b82a0',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},
                    y:{ticks:{color:'#7b82a0',maxTicksLimit:5,callback:v=>v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'k':'$'+v},grid:{color:'rgba(255,255,255,.05)'}}
                }
            }
        });
    }
}

            type:'doughnut',
            data:{labels:assets.map(a=>`${a.name} (${a.plat})`),datasets:[{data:assets.map(a=>a.val),backgroundColor:COLORS,borderWidth:1,borderColor:'rgba(255,255,255,.05)'}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#7b82a0',font:{size:10},padding:8,boxWidth:10}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${fd(ctx.raw)}`}}}}
        });
    }
    const tbody=assets.map(a=>`<tr><td><b>${a.name}</b></td><td>${fq(a.qty)}</td><td class="sensitive">${fd(a.val)}</td><td>${a.type}</td><td>${a.plat}</td><td>${a.status}</td></tr>`).join('');
    gi('assetsTable',`<table><thead><tr><th>Asset</th><th>Qty</th><th>Value</th><th>Type</th><th>Platform</th><th>Status</th></tr></thead><tbody>${tbody}</tbody></table>`);
}

function renderYearly() {
    const years=[];
    for(let i=95;i<=98;i++){const yr=V(i,0);if(!yr)continue;years.push({yr,nw:N(i,1),yoy:V(i,2)||'—',ta:N(i,3),btc:N(i,4)});}
    if(charts.year) charts.year.destroy();
    const ctx=document.getElementById('yearChart');
    if(ctx) {
        charts.year=new Chart(ctx,{
            type:'bar',
            data:{labels:years.map(y=>y.yr),datasets:[
                {label:'Net Worth',data:years.map(y=>y.nw),backgroundColor:'#7c6fef',borderRadius:4},
                {label:'Total Assets',data:years.map(y=>y.ta),backgroundColor:'rgba(0,212,255,.35)',borderColor:'#00d4ff',borderWidth:1,borderRadius:4}
            ]},
            options:{responsive:true,maintainAspectRatio:false,
                plugins:{legend:{labels:{color:'#7b82a0',font:{size:11}}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fd(ctx.raw)}`}}},
                scales:{x:{ticks:{color:'#7b82a0'},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#7b82a0',callback:v=>'$'+(v>=1000?(v/1000).toFixed(0)+'k':v)},grid:{color:'rgba(255,255,255,.05)'}}}
            }
        });
    }
    const tbody=years.map(y=>`<tr><td><b>${y.yr}</b></td><td class="sensitive">${fd(y.nw)}</td><td>${typeof y.yoy==='number'?(y.yoy===0?'—':fp(y.yoy)):y.yoy}</td><td class="sensitive">${fd(y.ta)}</td><td>${fq(y.btc)} &#x20bf;</td></tr>`).join('');
    gi('yearTable',`<table><thead><tr><th>Year</th><th>Net Worth</th><th>YoY</th><th>Total Assets</th><th>BTC</th></tr></thead><tbody>${tbody}</tbody></table>`);
}

// ─────────────────────────────────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────────────────────────────────
function setFilter(el) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    activeFilter = el.dataset.filter;
    document.body.dataset.filter = activeFilter;
    if (rows.length > 0) {
        updateSectorHeaders();
        renderSummary(); renderDebt(); renderProjections();
        renderVelocity(); renderMilestone(); renderMonteCarlo(); renderYearly();
    }
}

function doRefresh() { rows=[]; loadData(); }

function applyLock(lock, save) {
    isLocked = lock;
    const btn = document.getElementById('lockBtn');
    if (lock) {
        if (grid) { grid.enableMove(false); grid.enableResize(false); }
        if (editMode) { editMode=false; document.body.classList.remove('editing'); const eb=document.getElementById('editBtn'); if(eb) eb.classList.remove('on'); }
        if (btn) { btn.textContent='\uD83D\uDD12 Locked'; btn.classList.add('lock-on'); }
        saveLayout();
    } else {
        if (grid) { grid.enableMove(true); grid.enableResize(true); }
        if (btn) { btn.textContent='\uD83D\uDD13 Unlocked'; btn.classList.remove('lock-on'); }
    }
    if (save) localStorage.setItem(LS.locked, lock ? 'true' : 'false');
}

function toggleLock() { applyLock(!isLocked, true); }

function toggleEdit() {
    if (isLocked) { toast('Unlock layout first', true); return; }
    editMode = !editMode;
    document.body.classList.toggle('editing', editMode);
    document.getElementById('editBtn').classList.toggle('on', editMode);
    if (!editMode) { saveLayout(); toast('Layout saved', false); }
}

function togglePrivacy() {
    privacyOn = !privacyOn;
    document.body.classList.toggle('privacy', privacyOn);
    document.getElementById('privacyBtn').classList.toggle('on', privacyOn);
    localStorage.setItem(LS.privacy, privacyOn ? '1' : '0');
}

function setTheme(t) {
    document.body.className = document.body.className.replace(/theme-\w+/g,'').trim();
    if (t !== 'zhodler') document.body.classList.add('theme-' + t);
    document.querySelectorAll('.tpill').forEach(p => {
        const isActive = p.dataset.t === t;
        p.classList.toggle('active', isActive);
        p.setAttribute('aria-checked', isActive ? 'true' : 'false');
    });
    localStorage.setItem(LS.theme, t);
    if (rows.length > 0) { renderAssets(); renderYearly(); renderMonteCarlo(); }
}

function openSettings() {
    document.getElementById('sheetInput').value = localStorage.getItem(LS.sheet) || DEFAULT_SHEET;
    document.getElementById('modal').classList.add('open');
}
function closeSettings() { document.getElementById('modal').classList.remove('open'); }
function saveAndReload() {
    const raw = document.getElementById('sheetInput').value.trim();
    if (!raw) return;
    const m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
    localStorage.setItem(LS.sheet, m ? m[1] : raw);
    closeSettings(); rows=[]; loadData();
}
document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal'))closeSettings(); });

function toast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + (isErr ? 'err' : 'ok');
    clearTimeout(t._tid);
    t._tid = setTimeout(() => { t.className = ''; }, 3000);
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
(function init() {
    const theme = localStorage.getItem(LS.theme) || 'zhodler';
    setTheme(theme);
    if (localStorage.getItem(LS.privacy) === '1') togglePrivacy();
    loadData();
})();
</script>
</body>
</html>
