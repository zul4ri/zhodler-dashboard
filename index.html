<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f1117">
  <title>Zhodler Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/gridstack.js/10.3.1/gridstack.min.css">
  <style>
    /* ── THEMES ─────────────────────────────────────────────────── */
    :root {
      --bg:       #0f1117; --bg2:    #161922; --bg3:    #1c1f2e;
      --card:     #1e2235; --card2:  #252840; --border: rgba(255,255,255,0.07);
      --text:     #e8eaef; --text2:  #7b82a0; --text3:  #4a5070;
      --accent:   #7c6fef; --accent2:#00d4ff; --accent3:#b066ff;
      --green:    #00c896; --red:    #ff4d6d; --yellow: #ffb84d; --orange:#ff8c4b;
      --radius:   12px;    --radius2:8px;     --radius3:6px;
      --shadow:   0 4px 24px rgba(0,0,0,0.35);
      --shadow2:  0 2px 8px rgba(0,0,0,0.2);
    }
    .theme-light {
      --bg:#f0f2f8; --bg2:#e8eaf0; --bg3:#dde0ea; --card:#ffffff; --card2:#f5f6fb;
      --border:rgba(0,0,0,0.08); --text:#1a1d2e; --text2:#555a78; --text3:#9ba0ba;
    }
    .theme-ocean {
      --bg:#061622; --bg2:#0a2030; --bg3:#0e2a3e; --card:#102d44; --card2:#153550;
      --accent:#00c4ff; --accent2:#00ffc8;
    }
    .theme-sunset {
      --bg:#1a0e0a; --bg2:#231510; --bg3:#2d1b14; --card:#35201a; --card2:#3e261e;
      --accent:#ff6b35; --accent2:#ffd166;
    }
    .theme-navy-gold {
      --bg:#080e1f; --bg2:#0d1628; --bg3:#111d32; --card:#16233c; --card2:#1b2a47;
      --accent:#d4a017; --accent2:#f5cc5c;
    }

    /* ── RESET & BASE ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }
    a { color: var(--accent); text-decoration: none; }
    button { cursor: pointer; font-family: inherit; border: none; outline: none; }
    input, select { font-family: inherit; outline: none; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--card2); border-radius: 3px; }

    /* ── HEADER ─────────────────────────────────────────────────── */
    #header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px; height: 56px;
    }
    #header .logo {
      font-size: 17px; font-weight: 700; letter-spacing: -0.3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; white-space: nowrap;
    }
    #header .spacer { flex: 1; }
    #last-updated {
      font-size: 11px; color: var(--text3); white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    #last-updated .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); display: inline-block;
    }
    #last-updated .dot.loading { animation: pulse 1.2s ease infinite; }
    #last-updated .dot.error { background: var(--red); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 5px; padding: 6px 12px; border-radius: var(--radius3);
      font-size: 12px; font-weight: 500; transition: all 0.15s;
      background: var(--card2); color: var(--text2); border: 1px solid var(--border);
    }
    .btn:hover { background: var(--card); color: var(--text); border-color: var(--accent); }
    .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-icon {
      width: 32px; height: 32px; padding: 0;
      background: var(--card2); color: var(--text2); border: 1px solid var(--border);
      border-radius: var(--radius3); display: inline-flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.15s;
    }
    .btn-icon:hover { background: var(--card); color: var(--text); }

    #theme-select {
      background: var(--card2); color: var(--text2); border: 1px solid var(--border);
      border-radius: var(--radius3); padding: 5px 8px; font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }
    #theme-select:hover { border-color: var(--accent); color: var(--text); }

    /* ── PRIVACY MODE ───────────────────────────────────────────── */
    body.privacy .private { filter: blur(6px); user-select: none; pointer-events: none; }

    /* ── MAIN GRID AREA ─────────────────────────────────────────── */
    #grid-wrapper {
      padding: 16px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ── GRIDSTACK OVERRIDES ────────────────────────────────────── */
    .grid-stack { background: transparent !important; }
    .grid-stack-item-content {
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      overflow: hidden !important;
      box-shadow: var(--shadow2) !important;
      transition: border-color 0.2s, box-shadow 0.2s !important;
    }
    .grid-stack-item-content:hover {
      border-color: rgba(124,111,239,0.25) !important;
      box-shadow: var(--shadow) !important;
    }
    .grid-stack-item.ui-resizable-resizing .grid-stack-item-content,
    .grid-stack-item.ui-draggable-dragging .grid-stack-item-content {
      opacity: 0.85; box-shadow: 0 12px 40px rgba(0,0,0,0.5) !important;
    }
    .ui-resizable-handle { z-index: 50; }

    /* ── WIDGET LAYOUT ──────────────────────────────────────────── */
    .widget { display: flex; flex-direction: column; height: 100%; padding: 16px; overflow: hidden; }
    .widget-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; cursor: grab; flex-shrink: 0;
    }
    .widget-header:active { cursor: grabbing; }
    .widget-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text2);
    }
    .widget-badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 20px; background: var(--bg3); color: var(--text2);
    }
    .widget-badge.up { background: rgba(0,200,150,0.15); color: var(--green); }
    .widget-badge.down { background: rgba(255,77,109,0.15); color: var(--red); }
    .widget-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

    /* ── KPI WIDGET ─────────────────────────────────────────────── */
    .kpi-value {
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
      margin: 4px 0; line-height: 1.1;
      background: linear-gradient(135deg, var(--text) 60%, var(--text2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .kpi-sub { font-size: 12px; color: var(--text2); margin-top: 6px; }
    .kpi-change { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; }
    .kpi-change.up { color: var(--green); }
    .kpi-change.down { color: var(--red); }
    .kpi-sparkline { margin-top: 10px; flex: 1; min-height: 0; max-height: 60px; }

    /* ── TABLE WIDGET ───────────────────────────────────────────── */
    .data-table-wrap { flex: 1; overflow-y: auto; overflow-x: hidden; min-height: 0; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table thead th {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text3); padding: 0 8px 8px;
      border-bottom: 1px solid var(--border); text-align: left;
      position: sticky; top: 0; background: var(--card); z-index: 2;
    }
    .data-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    .data-table tbody tr:hover { background: var(--card2); }
    .data-table tbody tr:last-child { border-bottom: none; }
    .data-table tbody td { padding: 7px 8px; color: var(--text); vertical-align: middle; }
    .data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .data-table .tag {
      display: inline-flex; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 500;
    }
    .tag-green { background: rgba(0,200,150,0.15); color: var(--green); }
    .tag-red   { background: rgba(255,77,109,0.15); color: var(--red); }
    .tag-blue  { background: rgba(0,212,255,0.15);  color: var(--accent2); }
    .tag-purple{ background: rgba(124,111,239,0.15);color: var(--accent); }

    /* ── CHART WIDGET ───────────────────────────────────────────── */
    .chart-wrap { flex: 1; min-height: 0; position: relative; }
    .chart-wrap canvas { max-height: 100% !important; }

    /* ── GOALS WIDGET ───────────────────────────────────────────── */
    .goal-item { margin-bottom: 14px; }
    .goal-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
    .goal-name { color: var(--text); font-weight: 500; }
    .goal-pct  { color: var(--text2); }
    .goal-bar  { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .goal-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .goal-fill.done { background: var(--green); }
    .goal-targets { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); margin-top: 4px; }

    /* ── SUMMARY PILLS ──────────────────────────────────────────── */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .summary-pill {
      background: var(--bg3); border-radius: var(--radius2); padding: 10px 12px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .summary-pill-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
    .summary-pill-value { font-size: 14px; font-weight: 600; color: var(--text); }

    /* ── EMPTY / ERROR STATES ───────────────────────────────────── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; color: var(--text3); font-size: 12px; text-align: center; padding: 20px;
    }
    .empty-state .icon { font-size: 28px; opacity: 0.5; }
    .loading-skeleton {
      background: linear-gradient(90deg, var(--bg3) 25%, var(--card2) 50%, var(--bg3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }

    /* ── SETTINGS MODAL ─────────────────────────────────────────── */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); z-index: 200;
      display: none; align-items: center; justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #settings-modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; width: 480px; max-width: calc(100vw - 32px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.2s ease;
    }
    .modal-title {
      font-size: 16px; font-weight: 600; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius2); padding: 9px 12px; color: var(--text);
      font-size: 13px; transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-hint { font-size: 11px; color: var(--text3); margin-top: 5px; line-height: 1.4; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .btn-primary {
      background: var(--accent); color: #fff; padding: 8px 20px;
      border-radius: var(--radius3); font-size: 13px; font-weight: 500;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }

    /* ── TOAST NOTIFICATIONS ─────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 300;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius2); padding: 10px 16px;
      font-size: 13px; color: var(--text);
      box-shadow: var(--shadow); animation: slideRight 0.2s ease;
      pointer-events: all;
    }
    .toast-item.success { border-left: 3px solid var(--green); }
    .toast-item.error   { border-left: 3px solid var(--red); }

    /* ── ANIMATIONS ─────────────────────────────────────────────── */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes slideRight { from{transform:translateX(16px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    /* ── RESPONSIVE ─────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #header { padding: 0 12px; gap: 8px; }
      #header .logo { font-size: 15px; }
      #grid-wrapper { padding: 8px; }
      .kpi-value { font-size: 22px; }
      .widget { padding: 12px; }
      .widget-title { font-size: 10px; }
      /* GridStack handles 1-col on mobile via JS */
    }
    @media (max-width: 480px) {
      #last-updated { display: none; }
      .btn { padding: 5px 8px; font-size: 11px; }
    }

    /* ── LOCK STATE ─────────────────────────────────────────────── */
    body.locked .grid-stack-item { cursor: default !important; }
    body.locked .grid-stack-item .widget-header { cursor: default !important; }
    body.locked .ui-resizable-handle { display: none !important; }
  </style>
</head>
<body class="theme-dark">

  <!-- HEADER -->
  <header id="header">
    <div class="logo">⬡ Zhodler</div>
    <div id="last-updated">
      <span class="dot loading" id="status-dot"></span>
      <span id="update-time">Loading…</span>
    </div>
    <div class="spacer"></div>
    <select id="theme-select" title="Change theme">
      <option value="theme-dark">Dark</option>
      <option value="theme-light">Light</option>
      <option value="theme-ocean">Ocean</option>
      <option value="theme-sunset">Sunset</option>
      <option value="theme-navy-gold">Navy Gold</option>
    </select>
    <button class="btn-icon" id="btn-privacy" title="Toggle privacy mode">🔒</button>
    <button class="btn-icon" id="btn-lock"    title="Lock/unlock layout">🔓</button>
    <button class="btn-icon" id="btn-refresh" title="Refresh data">🔄</button>
    <button class="btn"      id="btn-settings">⚙ Settings</button>
  </header>

  <!-- MAIN GRID -->
  <div id="grid-wrapper">
    <div class="grid-stack" id="main-grid"></div>
  </div>

  <!-- SETTINGS MODAL -->
  <div id="modal-overlay">
    <div id="settings-modal">
      <div class="modal-title">
        ⚙ Settings
        <button class="btn-icon" id="btn-close-modal" style="font-size:16px;">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">Google Sheets URL</label>
        <input class="form-input" type="url" id="input-sheet-url"
          placeholder="https://docs.google.com/spreadsheets/d/…/edit">
        <div class="form-hint">Paste your spreadsheet's share URL. The sheet must be published to the web (File → Share → Publish to web).</div>
      </div>
      <div class="form-group">
        <label class="form-label">Currency Symbol</label>
        <input class="form-input" type="text" id="input-currency" placeholder="£" style="max-width:80px;">
      </div>
      <div class="form-group">
        <label class="form-label">Layout</label>
        <div style="display:flex;gap:8px;">
          <button class="btn" id="btn-export-layout">Export Layout</button>
          <label class="btn" style="cursor:pointer;">
            Import Layout <input type="file" id="input-import-layout" accept=".json" style="display:none;">
          </label>
          <button class="btn" id="btn-reset-layout">Reset</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="btn-cancel-settings">Cancel</button>
        <button class="btn-primary" id="btn-save-settings">Save & Refresh</button>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div id="toast"></div>

  <!-- SCRIPTS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gridstack.js/10.3.1/gridstack.all.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>
  /* ════════════════════════════════════════════════════════════════
     ZHODLER DASHBOARD  •  v2.0
     Architecture: data fetching → parsing → widget rendering → grid
  ════════════════════════════════════════════════════════════════ */

  /* ── CONFIG ──────────────────────────────────────────────────── */
  const SHEETS = ['Performance','BTCCrypto','Loans','AssetDistro','Split folio','Goals','Projections','TimePassed','Bank','Investments','Snapshot'];
  const DEFAULT_LAYOUT = [
    { id:'net-worth',    x:0,  y:0, w:3,  h:2 },
    { id:'defi-value',   x:3,  y:0, w:3,  h:2 },
    { id:'bank-total',   x:6,  y:0, w:3,  h:2 },
    { id:'invest-total', x:9,  y:0, w:3,  h:2 },
    { id:'performance',  x:0,  y:2, w:8,  h:4 },
    { id:'asset-distro', x:8,  y:2, w:4,  h:4 },
    { id:'btc-crypto',   x:0,  y:6, w:6,  h:4 },
    { id:'loans',        x:6,  y:6, w:6,  h:4 },
    { id:'bank-accts',   x:0,  y:10,w:6,  h:4 },
    { id:'investments',  x:6,  y:10,w:6,  h:4 },
    { id:'goals',        x:0,  y:14,w:6,  h:5 },
    { id:'snapshot',     x:6,  y:14,w:6,  h:5 },
  ];

  /* ── STATE ───────────────────────────────────────────────────── */
  const S = {
    sheetId:  localStorage.getItem('zhodler_sheetId')  || '',
    currency: localStorage.getItem('zhodler_currency') || '£',
    theme:    localStorage.getItem('zhodler_theme')    || 'theme-dark',
    layout:   JSON.parse(localStorage.getItem('zhodler_layout') || 'null'),
    data:     {},
    charts:   {},
    grid:     null,
    locked:   false,
    privacy:  false,
    loading:  false,
  };

  /* ── HELPERS ─────────────────────────────────────────────────── */
  function extractSheetId(url) {
    const m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    return m ? m[1] : url.trim();
  }

  function fmt(val, decimals = 0) {
    const n = parseFloat(String(val).replace(/[^0-9.\-]/g,''));
    if (isNaN(n)) return '–';
    return S.currency + n.toLocaleString('en-GB', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  }

  function fmtPct(val) {
    const n = parseFloat(String(val).replace(/[^0-9.\-]/g,''));
    if (isNaN(n)) return '–';
    return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  }

  function parseCSV(text) {
    if (!text || text.trim().startsWith('<!')) return [];
    const rows = []; let field = '', row = [], inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (c === '"') {
        if (inQ && text[i+1] === '"') { field += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) { row.push(field.trim()); field = ''; }
      else if ((c === '\n' || c === '\r') && !inQ) {
        if (c === '\r' && text[i+1] === '\n') i++;
        row.push(field.trim()); if (row.some(c=>c)) rows.push(row);
        row = []; field = '';
      } else field += c;
    }
    if (field || row.length) { row.push(field.trim()); if (row.some(c=>c)) rows.push(row); }
    return rows;
  }

  async function fetchSheet(name) {
    if (!S.sheetId) return null;
    try {
      const url = `https://docs.google.com/spreadsheets/d/${S.sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
      const r = await fetch(url, { cache: 'no-store' });
      if (!r.ok) return null;
      return parseCSV(await r.text());
    } catch { return null; }
  }

  function rowsToObjects(rows) {
    if (!rows || rows.length < 2) return [];
    const headers = rows[0].map(h => h.toLowerCase().trim());
    return rows.slice(1).map(r => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = r[i] || ''; });
      return obj;
    });
  }

  function num(v) { return parseFloat(String(v).replace(/[^0-9.\-]/g,'')) || 0; }
  function colIdx(rows, name) { if (!rows?.[0]) return -1; return rows[0].findIndex(c => c.toLowerCase().includes(name.toLowerCase())); }

  function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast-item ${type}`;
    el.textContent = msg;
    document.getElementById('toast').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  /* ── DATA LOADING ────────────────────────────────────────────── */
  async function loadAllData() {
    if (!S.sheetId) { setStatus('error', 'No sheet configured'); return; }
    setStatus('loading', 'Refreshing…');
    S.loading = true;
    const results = await Promise.allSettled(SHEETS.map(name => fetchSheet(name)));
    SHEETS.forEach((name, i) => {
      S.data[name] = results[i].status === 'fulfilled' ? results[i].value : null;
    });
    S.loading = false;
    renderAll();
    setStatus('ok', 'Updated ' + new Date().toLocaleTimeString());
  }

  /* ── CHART HELPERS ───────────────────────────────────────────── */
  const CHART_DEFAULTS = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: 'rgba(20,22,35,0.95)', titleColor: '#e8eaef',
      bodyColor: '#7b82a0', borderColor: 'rgba(255,255,255,0.08)',
      borderWidth: 1, padding: 10, cornerRadius: 8,
    }},
    scales: {
      x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#4a5070', font: { size: 10 }, maxTicksLimit: 8 } },
      y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#4a5070', font: { size: 10 } } },
    }
  };

  function accentGradient(ctx, color1 = '#7c6fef', color2 = '#00d4ff') {
    const g = ctx.createLinearGradient(0, 0, ctx.canvas.width, 0);
    g.addColorStop(0, color1); g.addColorStop(1, color2); return g;
  }

  function areaGradient(ctx, color, alpha1 = 0.3, alpha2 = 0) {
    const g = ctx.createLinearGradient(0, 0, 0, ctx.canvas.height);
    g.addColorStop(0, color + Math.round(alpha1 * 255).toString(16).padStart(2,'0'));
    g.addColorStop(1, color + Math.round(alpha2 * 255).toString(16).padStart(2,'0'));
    return g;
  }

  function makeChart(canvasId, type, data, options = {}) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return null;
    if (S.charts[canvasId]) { S.charts[canvasId].destroy(); }
    const chart = new Chart(canvas, {
      type,
      data,
      options: deepMerge(structuredClone(CHART_DEFAULTS), options)
    });
    S.charts[canvasId] = chart;
    return chart;
  }

  function deepMerge(target, source) {
    for (const k in source) {
      if (source[k] && typeof source[k] === 'object' && !Array.isArray(source[k])) {
        target[k] = target[k] || {};
        deepMerge(target[k], source[k]);
      } else { target[k] = source[k]; }
    }
    return target;
  }

  /* ── RENDERERS ───────────────────────────────────────────────── */

  function renderNetWorth() {
    const perf = S.data['Performance'];
    const bank = S.data['Bank'];
    const inv  = S.data['Investments'];
    const snap = S.data['Snapshot'];

    let defiVal = 0, bankVal = 0, invVal = 0;

    if (perf && perf.length > 1) {
      const viIdx = colIdx(perf, 'value') > -1 ? colIdx(perf, 'value') : colIdx(perf, 'total');
      if (viIdx > -1) defiVal = num(perf[perf.length - 1]?.[viIdx]);
    }
    if (bank && bank.length > 1) {
      const bi = colIdx(bank, 'balance');
      if (bi > -1) bankVal = bank.slice(1).reduce((s, r) => s + num(r[bi]), 0);
    }
    if (inv && inv.length > 1) {
      const ii = colIdx(inv, 'value') > -1 ? colIdx(inv, 'value') : colIdx(inv, 'balance');
      if (ii > -1) invVal = inv.slice(1).reduce((s, r) => s + num(r[ii]), 0);
    }

    const total = defiVal + bankVal + invVal;

    // Net Worth KPI
    let nwEl = document.getElementById('v-net-worth');
    if (nwEl) nwEl.textContent = total > 0 ? fmt(total) : '–';

    // Sparkline from Snapshot
    if (snap && snap.length > 2) {
      const dIdx = colIdx(snap, 'date');
      const nwIdx = colIdx(snap, 'net worth') > -1 ? colIdx(snap, 'net worth') : snap[0].length - 1;
      const labels = snap.slice(-12).map(r => r[dIdx] || '');
      const vals   = snap.slice(-12).map(r => num(r[nwIdx]));
      const ctx = document.getElementById('c-net-worth');
      if (ctx) {
        const grad = ctx.getContext('2d') ? areaGradient(ctx.getContext('2d'), '#7c6fef') : null;
        makeChart('c-net-worth', 'line', {
          labels,
          datasets: [{ data: vals, borderColor: '#7c6fef', backgroundColor: grad,
            borderWidth: 2, fill: true, tension: 0.4, pointRadius: 0 }]
        }, { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } });
      }
    }

    // Sub-widgets
    document.getElementById('v-defi-value').textContent = defiVal > 0 ? fmt(defiVal) : '–';
    document.getElementById('v-bank-total').textContent = bankVal > 0 ? fmt(bankVal) : '–';
    document.getElementById('v-invest-total').textContent = invVal > 0 ? fmt(invVal) : '–';
  }

  function renderPerformance() {
    const rows = S.data['Performance'];
    if (!rows || rows.length < 2) { return setEmpty('ch-performance', 'No performance data'); }
    const dateI = colIdx(rows, 'date') > -1 ? colIdx(rows, 'date') : colIdx(rows, 'time');
    const valI  = colIdx(rows, 'value') > -1 ? colIdx(rows, 'value') : colIdx(rows, 'total');
    if (valI === -1) { return setEmpty('ch-performance', 'No "Value" column found'); }

    const slice = rows.slice(1).slice(-90); // last 90 data points
    const labels = slice.map(r => r[dateI] || '');
    const values = slice.map(r => num(r[valI]));

    const ctx = document.getElementById('c-performance')?.getContext('2d');
    const grad = ctx ? areaGradient(ctx, '#7c6fef') : null;

    makeChart('c-performance', 'line', {
      labels,
      datasets: [{
        data: values, label: 'Portfolio Value',
        borderColor: '#7c6fef', backgroundColor: grad,
        borderWidth: 2.5, fill: true, tension: 0.35, pointRadius: 0,
        pointHoverRadius: 5, pointHoverBackgroundColor: '#7c6fef',
      }]
    }, {
      scales: {
        x: { ticks: { callback: (v, i) => { const l = labels[i]; return l?.split?.('T')[0] || l; } } },
        y: { ticks: { callback: v => S.currency + (v >= 1000 ? (v/1000).toFixed(0)+'k' : v) } }

      const badge = document.getElementById('b-performance');
      if (badge) { badge.textContent = fmtPct(change); badge.className = 'widget-badge ' + (change >= 0 ? 'up' : 'down'); }

  function initGrid() {
    const container = document.getElementById('main-grid');
    const isMobile  = window.innerWidth < 768;
    const layout    = S.layout || DEFAULT_LAYOUT;

    // Build grid items in DOM before initialising GridStack
    layout.forEach(item => {
      const def = WIDGET_DEFS[item.id];
      if (!def) return;
      const el = document.createElement('div');
      el.className = 'grid-stack-item';
      el.setAttribute('gs-id', item.id);
      el.setAttribute('gs-w',  isMobile ? 12 : item.w);
      el.setAttribute('gs-h',  item.h);
      el.setAttribute('gs-x',  isMobile ? 0  : item.x);
      el.setAttribute('gs-y',  item.y);
      el.innerHTML = `<div class="grid-stack-item-content">${def.content}</div>`;
      container.appendChild(el);
    });

    // Initialise GridStack after DOM is populated
    S.grid = GridStack.init({
      column:               isMobile ? 1 : 12,
      columnOpts:           { breakpoints: [{ w: 768, c: 1 }] },
      cellHeight:           80,
      margin:               8,
      animate:              true,
      float:                false,
      draggable:            { handle: '.widget-header' },
      resizable:            { handles: 'se,sw,ne,nw' },
      disableOneColumnMode: false,
    }, container);

    // Persist layout on any change
    S.grid.on('change', () => {
      const items = S.grid.save(false); // false = don't include content
      localStorage.setItem('zhodler_layout', JSON.stringify(items));
      S.layout = items;
    });

    // Resize all Chart.js instances when a widget is resized
    S.grid.on('resizestop', () => {
      setTimeout(() => Object.values(S.charts).forEach(c => c?.resize()), 50);
    });

    // Column collapse on window resize
    window.addEventListener('resize', debounce(() => {
      const mobile = window.innerWidth < 768;
      S.grid.column(mobile ? 1 : 12);
      setTimeout(() => Object.values(S.charts).forEach(c => c?.resize()), 100);
    }, 200));
  }

  function debounce(fn, ms) {
    let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  }

  });

  document.getElementById('theme-select').addEventListener('change', e => {
    document.body.className = document.body.className.replace(/theme-\S+/g, '').trim();
    document.body.classList.add(e.target.value);
    S.theme = e.target.value;
    localStorage.setItem('zhodler_theme', e.target.value);
  });

  document.getElementById('btn-export-layout').addEventListener('click', () => {
    const layout = S.grid.save();
    const blob = new Blob([JSON.stringify(layout, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'zhodler-layout.json'; a.click();
  });

  document.getElementById('input-import-layout').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const layout = JSON.parse(ev.target.result);
        localStorage.setItem('zhodler_layout', JSON.stringify(layout));
        S.layout = layout; toast('Layout imported — reload to apply');
      } catch { toast('Invalid layout file', 'error'); }
    };
    reader.readAsText(file);
  });

  document.getElementById('btn-reset-layout').addEventListener('click', () => {
    localStorage.removeItem('zhodler_layout');
    S.layout = null;
    location.reload();
  });

  /* ── INIT ────────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', () => {
    // Apply saved theme
    document.body.className = S.theme;
    document.getElementById('theme-select').value = S.theme;

    // Init grid
    initGrid();

    // Load data
    if (S.sheetId) {
      loadAllData();
    } else {
      setStatus('error', 'No sheet URL — click ⚙ Settings');
      renderAll(); // render empty states
    }

    // Auto refresh every 5 minutes
    setInterval(loadAllData, 5 * 60 * 1000);
  });
  </script>
</body>
</html>
