<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhodler Dashboard</title>
    <!-- GridStack v10 via jsdelivr (proven stable) -->
    <link  href="https://cdn.jsdelivr.net/npm/gridstack@10.0.0/dist/gridstack.min.css" rel="stylesheet">
    <link  href="https://cdn.jsdelivr.net/npm/gridstack@10.0.0/dist/gridstack-extra.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gridstack@10.0.0/dist/gridstack-all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
/* ── THEMES ──────────────────────────────────────────────────────────────── */
:root {
    --bg:     #000000; --bg2:   #080808;
    --card:   #060606; --card2: #0d0d0d;
    --border: rgba(255,255,255,0.11);
    --text:   #ffffff; --text2: #888888;   /* 5.74:1 on #000 — WCAG AA ✓ */
    --accent: #00ff7f; --green: #00ff7f;   /* 8.48:1 on #000 ✓ */
    --red:    #ff4d6d; --yellow:#ffcc00;   /* 4.99:1 / 13.08:1 on #000 ✓ */
    --glow:   rgba(0,255,127,0.06);
    --f-port: var(--accent);
    --f-liq:  #00d4ff;   /* 7.33:1 on #000 ✓ */
    --f-cryp: #ff9500;   /* 8.24:1 on #000 ✓ */
    --f-trad: #c084fc;   /* 6.30:1 on #000 ✓ */
}
.theme-cyan {
    --bg:#000000; --bg2:#040a0e; --card:#060e14; --card2:#0a141c;
    --border:rgba(255,255,255,.10); --text:#ffffff; --text2:#8aacbc;
    --accent:#00d4ff; --green:#00d4ff; --red:#ff6685; --yellow:#ffcc00;
    --glow:rgba(0,212,255,0.06);
}
.theme-neon {
    --bg:#000000; --bg2:#06040f; --card:#0a071a; --card2:#100d22;
    --border:rgba(167,139,250,.12); --text:#ffffff; --text2:#9080cc;
    --accent:#b060ff; --green:#3adf80; --red:#fb7185; --yellow:#facc15;
    --glow:rgba(176,96,255,0.08);
}
.theme-cyber {
    --bg:#000000; --bg2:#04090c; --card:#060e12; --card2:#0a1418;
    --border:rgba(255,255,255,.10); --text:#ffffff; --text2:#4aaa90;  /* 4.60:1 ✓ */
    --accent:#00e5b0; --green:#00e5b0; --red:#ff6685; --yellow:#fde047;
    --glow:rgba(0,229,176,0.06);
}

/* ── RESET & ACCESSIBILITY ───────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;}
/* WCAG 2.1 SC 2.4.11 — visible focus for all keyboard-navigable elements */
*:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
    border-radius:3px;
}
body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:clamp(11px,1.1vw,14px); min-height:100vh;
}
body.privacy .sensitive{filter:blur(8px);pointer-events:none;user-select:none;}

/* ── HEADER ──────────────────────────────────────────────────────────────── */
.header{
    display:flex; align-items:center; justify-content:space-between;
    padding:clamp(8px,1vh,14px) clamp(14px,1.6vw,24px);
    background:var(--bg2); border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:200;
    flex-wrap:wrap; gap:6px;
}
.brand{
    font-size:clamp(17px,1.9vw,26px); font-weight:900;
    color:var(--accent); letter-spacing:-0.5px;
}
.ts{font-size:clamp(9px,0.82vw,11px);color:var(--text2);margin-left:10px;}
.hright{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sep{width:1px;height:16px;background:var(--border);margin:0 2px;}

.pill{
    padding:clamp(4px,0.5vh,7px) clamp(10px,1.1vw,16px); border-radius:4px;
    border:1px solid var(--border); background:transparent; color:var(--text2);
    cursor:pointer; font-size:clamp(10px,0.92vw,12px); font-weight:500;
    transition:border-color .15s, color .15s; user-select:none; letter-spacing:.3px;
}
.pill:hover{border-color:var(--accent);color:var(--text);}
/* Active pills: dark text on vivid bg for max contrast (WCAG AA ✓) */
.pill[data-filter="portfolio"].active{
    color:#000; font-weight:700;
    background:var(--f-port); border-color:var(--f-port);
}
.pill[data-filter="liquid"].active{
    color:#000; font-weight:700;
    background:var(--f-liq); border-color:var(--f-liq);
}
.pill[data-filter="crypto"].active{
    color:#000; font-weight:700;
    background:var(--f-cryp); border-color:var(--f-cryp);
}
.pill[data-filter="tradfi"].active{
    color:#000; font-weight:700;
    background:var(--f-trad); border-color:var(--f-trad);
}

.ibtn{
    height:clamp(26px,2.8vh,32px); min-width:clamp(26px,2.8vh,32px);
    padding:0 clamp(6px,0.7vw,10px); border-radius:4px;
    border:1px solid var(--border); background:transparent; color:var(--text2);
    cursor:pointer; font-size:clamp(10px,0.9vw,12px); font-weight:500;
    display:flex; align-items:center; gap:4px; white-space:nowrap;
    transition:border-color .15s, color .15s;
}
.ibtn:hover{border-color:var(--accent);color:var(--text);}
.ibtn.on{border-color:var(--green);color:var(--green);}
.ibtn.lock-on{border-color:var(--yellow);color:var(--yellow);}

/* Theme dots */
.tpill{
    width:clamp(13px,1.2vw,17px); height:clamp(13px,1.2vw,17px);
    border-radius:50%; border:2px solid transparent;
    cursor:pointer; transition:transform .2s, border-color .2s; flex-shrink:0;
}
.tpill:hover,.tpill.active{border-color:var(--text);transform:scale(1.3);}
.tpill[data-t="zhodler"]{background:linear-gradient(135deg,#00ff7f,#00c060);}
.tpill[data-t="cyan"]   {background:linear-gradient(135deg,#00d4ff,#2060ee);}
.tpill[data-t="neon"]   {background:linear-gradient(135deg,#b060ff,#3adf80);}
.tpill[data-t="cyber"]  {background:linear-gradient(135deg,#00e5b0,#20b0e0);}

/* ── GRIDSTACK OVERRIDES ─────────────────────────────────────────────────── */
.grid-stack{background:transparent;padding:clamp(4px,0.5vw,8px);}
.grid-stack-item-content{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:2px; overflow:auto;
    display:flex; flex-direction:column;
    inset:0 !important;
    transition:border-color .2s;
    position:relative;
    /* container queries: children size relative to the card */
    container-type:inline-size;
}
.grid-stack-item-content:hover{
    border-color:rgba(255,255,255,.22);
}
body.editing .grid-stack-item-content{
    border-color:var(--accent); border-style:dashed;
}
/* Resize handle */
.grid-stack-item>.ui-resizable-handle{opacity:.25;transition:opacity .2s;}
.grid-stack-item:hover>.ui-resizable-handle{opacity:.65;}
.ui-resizable-se{background:none!important;border:none!important;width:18px!important;height:18px!important;}
.ui-resizable-se::after{
    content:''; position:absolute; bottom:5px; right:5px;
    width:8px; height:8px;
    border-right:2px solid var(--accent); border-bottom:2px solid var(--accent);
    border-radius:0 0 2px 0;
}

/* ── WIDGET INTERNALS ────────────────────────────────────────────────────── */
.whead{
    display:flex; align-items:flex-start; justify-content:space-between;
    padding:clamp(6px,0.8vh,10px) clamp(10px,1.2vw,16px); flex-shrink:0;
    border-bottom:1px solid var(--border); cursor:grab;
    background:transparent;
}
.whead:active{cursor:grabbing;}

/* Sector badge — small label pill */
.wsector{
    display:inline-flex; align-items:center;
    padding:1px 7px; border-radius:3px; margin-bottom:3px;
    font-size:clamp(7px,1.2cqi,10px); font-weight:700;
    letter-spacing:1px; text-transform:uppercase;
    transition:color .2s, background .2s, border-color .2s;
    /* default = accent */
    color:var(--accent);
    background:color-mix(in srgb,var(--accent) 10%,transparent);
    border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);
}
body[data-filter="portfolio"] .wsector[id]{
    color:var(--f-port);
    background:color-mix(in srgb,var(--f-port) 10%,transparent);
    border-color:color-mix(in srgb,var(--f-port) 25%,transparent);
}
body[data-filter="liquid"] .wsector[id]{
    color:var(--f-liq);
    background:color-mix(in srgb,var(--f-liq) 10%,transparent);
    border-color:color-mix(in srgb,var(--f-liq) 25%,transparent);
}
body[data-filter="crypto"] .wsector[id]{
    color:var(--f-cryp);
    background:color-mix(in srgb,var(--f-cryp) 10%,transparent);
    border-color:color-mix(in srgb,var(--f-cryp) 25%,transparent);
}
body[data-filter="tradfi"] .wsector[id]{
    color:var(--f-trad);
    background:color-mix(in srgb,var(--f-trad) 10%,transparent);
    border-color:color-mix(in srgb,var(--f-trad) 25%,transparent);
}
.wtitle{
    font-size:clamp(10px,1.8cqi,14px); font-weight:700; color:var(--text);
    letter-spacing:0;
}
.wsub{
    font-size:clamp(8px,1.2cqi,10px); color:var(--text2);
    margin-top:2px; font-style:normal;
    text-transform:uppercase; letter-spacing:.5px;
}
.wbody{
    padding:clamp(8px,1vh,14px) clamp(10px,1.2vw,16px);
    flex:1; overflow:auto;
    display:flex; flex-direction:column; justify-content:center;
}

/* ── KPI ─────────────────────────────────────────────────────────────────── */
.krow{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(90px,9.5vw,130px),1fr));gap:clamp(4px,0.5vw,8px);}
.kpi{
    background:var(--card2);
    border:1px solid var(--border); border-radius:2px;
    padding:clamp(8px,1vh,13px) clamp(9px,1vw,13px);
    transition:border-color .2s;
    container-type:inline-size;
}
.kpi:hover{border-color:rgba(255,255,255,.22);}
.klbl{font-size:clamp(7px,8cqi,10px);color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;font-weight:600;}
.kval{font-size:clamp(12px,11cqi,22px);font-weight:800;line-height:1.15;letter-spacing:-.3px;}
.ksub{font-size:clamp(9px,7cqi,11px);color:var(--text2);margin-top:3px;}
.pos{color:var(--green);} .neg{color:var(--red);} .warn{color:var(--yellow);}

/* Progress bar */
.pbar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:6px;overflow:hidden;}
.pfill{height:100%;background:var(--accent);border-radius:2px;}

/* ── TABLE ───────────────────────────────────────────────────────────────── */
.twrap{overflow-x:auto;margin-top:6px;}
table{width:100%;border-collapse:collapse;font-size:clamp(10px,1vw,12px);}
th{color:var(--text2);text-align:left;padding:clamp(4px,0.5vh,7px) clamp(6px,0.8vw,10px);
   border-bottom:1px solid var(--border);font-size:clamp(8px,0.78vw,10px);
   text-transform:uppercase;letter-spacing:.7px;font-weight:600;white-space:nowrap;}
td{padding:clamp(5px,0.6vh,8px) clamp(6px,0.8vw,10px);
   border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;font-size:clamp(10px,1vw,12px);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.03);}

/* ── CHART ───────────────────────────────────────────────────────────────── */
.chwrap{position:relative;min-height:clamp(100px,14vh,140px);flex:1;}

/* ── MONTE CARLO ─────────────────────────────────────────────────────────── */
.mc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(4px,0.5vw,7px);margin-bottom:clamp(5px,0.7vh,9px);}
.mc-box{text-align:center;padding:clamp(6px,0.8vh,9px) clamp(3px,0.4vw,6px);
        background:var(--card2);border:1px solid var(--border);border-radius:2px;}
.mc-box .klbl{margin-bottom:3px;font-size:clamp(7px,0.72vw,9px);}
.mc-box .kval{font-size:clamp(11px,1.15vw,14px);font-weight:800;}
.mc-scenarios{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(4px,0.5vw,7px);margin-bottom:clamp(5px,0.7vh,9px);}
.mc-scenario{padding:clamp(6px,0.8vh,9px) clamp(7px,0.8vw,10px);
             background:var(--card2);border:1px solid var(--border);border-radius:2px;}
.mc-scenario-title{font-size:clamp(8px,0.88vw,10px);font-weight:700;margin-bottom:4px;}
.mc-scenario-val{font-size:clamp(9px,0.9vw,11px);color:var(--text2);}

/* ── MILESTONE ───────────────────────────────────────────────────────────── */
.ms-outer{padding:4px 0;}
.ms-track{position:relative;height:clamp(26px,3.4vh,36px);margin:0 14px;}
.ms-line{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(255,255,255,.08);border-radius:1px;transform:translateY(-50%);z-index:0;}
.ms-fill{position:absolute;top:50%;left:0;height:2px;
         background:var(--accent);
         border-radius:1px;transform:translateY(-50%);z-index:1;}
.ms-dots{position:absolute;inset:0;display:flex;justify-content:space-between;align-items:center;z-index:2;}
.ms-circle{width:clamp(20px,2.1vw,28px);height:clamp(20px,2.1vw,28px);border-radius:50%;
           border:2px solid var(--border);background:var(--card);
           display:flex;align-items:center;justify-content:center;
           font-size:clamp(8px,0.9vw,11px);flex-shrink:0;transition:all .25s;}
.ms-circle.done{
    background:var(--green);border-color:var(--green);color:#000;font-weight:700;
}
.ms-circle.next{
    border-color:var(--accent);
    box-shadow:0 0 10px color-mix(in srgb,var(--accent) 45%,transparent);
}
.ms-labels{display:flex;justify-content:space-between;margin:5px 0 0 0;}
.ms-label{display:flex;flex-direction:column;align-items:center;width:clamp(20px,2.1vw,28px);flex-shrink:0;}
.ms-name{font-size:clamp(6px,0.68vw,9px);color:var(--text2);text-align:center;white-space:nowrap;}
.ms-eta{font-size:clamp(5px,0.62vw,8px);margin-top:1px;text-align:center;}
.ms-legend{font-size:clamp(8px,0.82vw,10px);color:var(--text2);
           margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.ms-legend-bar{width:24px;height:2px;background:var(--accent);border-radius:1px;flex-shrink:0;}

/* ── VELOCITY ────────────────────────────────────────────────────────────── */
.vel-hero{text-align:center;padding:clamp(6px,1vh,12px) 0 6px;}
.vel-hero .kval{font-size:clamp(22px,2.8vw,38px);font-weight:900;letter-spacing:-1px;}

/* ── TOAST ───────────────────────────────────────────────────────────────── */
#toast{
    position:fixed;bottom:20px;right:20px;
    background:var(--card2);border:1px solid var(--border);
    border-radius:4px;padding:10px 16px;font-size:clamp(10px,1vw,12px);
    opacity:0;pointer-events:none;transition:opacity .25s;z-index:999;max-width:280px;
}
#toast.show{opacity:1;}
#toast.ok{border-color:var(--green);color:var(--green);}
#toast.err{border-color:var(--red);color:var(--red);}

/* ── MODAL ───────────────────────────────────────────────────────────────── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;align-items:center;justify-content:center;}
.modal.open{display:flex;}
.mbox{
    background:var(--card2);border:1px solid var(--border);
    border-radius:4px;padding:clamp(18px,2vw,26px);width:480px;max-width:95vw;
}
.mtitle{font-size:clamp(14px,1.4vw,17px);font-weight:700;margin-bottom:18px;}
.mrow{margin-bottom:14px;}
.mlabel{font-size:clamp(9px,0.88vw,11px);color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.7px;font-weight:600;}
.minput{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);font-size:clamp(11px,1.1vw,13px);}
.minput:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent;}
.mactions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
.mprimary{padding:9px 18px;background:var(--accent);border:none;border-radius:3px;color:#000;cursor:pointer;font-size:clamp(11px,1.1vw,13px);font-weight:700;}
.mcancel{padding:9px 16px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--text2);cursor:pointer;font-size:clamp(11px,1.1vw,13px);}
.mgray{padding:9px 16px;background:var(--card);border:1px solid var(--border);border-radius:3px;color:var(--text);cursor:pointer;font-size:clamp(11px,1.1vw,13px);}
.mrow-row{display:flex;gap:8px;flex-wrap:wrap;}

/* ── LOADING OVERLAY ─────────────────────────────────────────────────────── */
#loadOverlay{
    position:fixed;inset:0;background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    z-index:300;flex-direction:column;gap:14px;
}
#loadOverlay .brand{font-size:clamp(32px,4vw,52px);}

/* ── INDIVIDUAL STAT CARDS ───────────────────────────────────────────────── */
.stat-body{
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding:0;
    flex:1; min-height:0; overflow:hidden; gap:4px;
    /* size container so font can scale with both width (cqi) AND height (cqb) */
    container-type:size;
}
/* Fluid stat value — scales with whichever card dimension is smaller */
.stat-val{
    font-size:clamp(16px, min(7cqi, 11cqb), 48px); font-weight:900;
    line-height:1.0; letter-spacing:-0.5px;
    white-space:nowrap; max-width:100%;
    overflow:hidden; text-overflow:ellipsis;
}
.stat-val.hero{
    font-size:clamp(22px, min(10cqi, 16cqb), 72px);
    letter-spacing:-1.5px;
}
.stat-sub{
    font-size:clamp(9px, min(2cqi, 3cqb), 13px); color:var(--text2);
    text-transform:uppercase; letter-spacing:.5px;
}

function fp(n){if(typeof n==='string')return n;const p=(n>-2&&n<2)?n*100:n;return(p>=0?'+':'')+p.toFixed(2)+'%';}

// Smaller cells = finer vertical granularity; 24 columns = finer horizontal granularity
function calcCellHeight() {
    return Math.max(36, Math.min(62, Math.round(window.innerHeight / 20)));
}

function initGrid() {
    if (grid) return;

    if (typeof GridStack === 'undefined') {
        throw new Error('GridStack library failed to load. Check your internet connection.');
    }

    grid = GridStack.init({
        column: 24,  // 24 columns for fine horizontal granularity
        cellHeight: calcCellHeight(),
        margin: 0,
        float: true,          // widgets are fully independent — no forced reflow
        animate: true,
        disableDrag: false,   // always draggable (lock controls it)
        disableResize: false, // always resizable (lock controls it)
        resizable: {handles: 'se,s,e,sw,w'},
        draggable: {handle: '.whead'},
    }, '#grid');

    const layout = savedLayout || DEFAULT_LAYOUT;

    layout.forEach(item => {
        if (!WIDGET_HTML[item.id]) return;
        grid.addWidget({
            id: item.id, x: item.x, y: item.y, w: item.w, h: item.h,
            content: `<div class="grid-stack-item-content">${WIDGET_HTML[item.id]}</div>`,
        });
    });

    grid.on('change', saveLayout);

    // Restore lock state
    if (localStorage.getItem(LS.locked) === 'true') {
        applyLock(true, false);
    }

    // Update cell height whenever the window is resized
    let _rhTimer;
    window.addEventListener('resize', () => {
        clearTimeout(_rhTimer);
        _rhTimer = setTimeout(() => {
            if (grid) grid.cellHeight(calcCellHeight());
        }, 150);
    });
}

function saveLayout() {
    if (!grid) return;
    const items = grid.getGridItems().map(el => {
        const n = el.gridstackNode;
        return {id: n.id, x: n.x, y: n.y, w: n.w, h: n.h};
    });
    localStorage.setItem(LS.layout, JSON.stringify(items));
}

function loadLayout() {
    try {
        const s = localStorage.getItem(LS.layout);
        if (!s) return null;
        const parsed = JSON.parse(s);
        // Validate all widget IDs are still valid; add missing ones
        const validIds = Object.keys(WIDGET_HTML);
        const filtered = parsed.filter(i => validIds.includes(i.id));
        const savedIds = filtered.map(i => i.id);
        const missing  = DEFAULT_LAYOUT.filter(i => !savedIds.includes(i.id));
        const maxY     = filtered.length ? Math.max(...filtered.map(i => i.y + i.h)) : 0;
        missing.forEach((w, idx) => filtered.push({...w, y: maxY + idx * 4}));
        return filtered;
    } catch { return null; }
}

function resetLayout() {
    if (!grid) return;
    localStorage.removeItem(LS.layout);
    grid.removeAll();
    DEFAULT_LAYOUT.forEach(item => {
        grid.addWidget({
            id: item.id, x: item.x, y: item.y, w: item.w, h: item.h,
            content: `<div class="grid-stack-item-content">${WIDGET_HTML[item.id]}</div>`,
        });
    });
    if (rows.length > 0) setTimeout(() => renderAll(), 80);
    toast('Layout reset to default', false);
}

function exportLayout() {
    if (!grid) return;
    const items = grid.getGridItems().map(el => {
        const n = el.gridstackNode;
        return {id: n.id, x: n.x, y: n.y, w: n.w, h: n.h};
    });
    const data = {
        version: '4', date: new Date().toISOString(),
        theme: document.body.className.replace('privacy','').trim() || 'zhodler',
        locked: isLocked, layout: items,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(blob),
        download: `zhodler-layout-${new Date().toISOString().slice(0,10)}.json`,
    });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Layout exported', false);
}

function importLayout(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.layout || !Array.isArray(data.layout)) throw new Error('Invalid layout file');
            localStorage.setItem(LS.layout, JSON.stringify(data.layout));
            if (data.theme) setTheme(data.theme);
            grid.removeAll();
            data.layout.forEach(item => {
                if (!WIDGET_HTML[item.id]) return;
                grid.addWidget({
                    id: item.id, x: item.x, y: item.y, w: item.w, h: item.h,
                    content: `<div class="grid-stack-item-content">${WIDGET_HTML[item.id]}</div>`,
                });
            });
            if (data.locked !== undefined) applyLock(data.locked, true);
            if (rows.length > 0) setTimeout(() => renderAll(), 80);
            closeSettings();
            toast('Layout imported', false);
        } catch(err) { toast('Import failed: ' + err.message, true); }
    };
    reader.readAsText(file);
    input.value = '';
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA FETCH
// ─────────────────────────────────────────────────────────────────────────────
async function loadData() {
    const id  = localStorage.getItem(LS.sheet) || DEFAULT_SHEET;
    const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=Dashboard_Data&_t=${Date.now()}`;

    const isFirstLoad = !grid;
    if (isFirstLoad) {
        document.getElementById('loadMsg').textContent = 'Loading data\u2026';
        document.getElementById('loadOverlay').style.display = 'flex';
    } else {
        // On refresh, show a subtle spinner in the timestamp instead of blanking the dashboard
        document.getElementById('ts').textContent = '⟳ refreshing…';
    }

    // ── Fetch data ───────────────────────────────────────────────────────────
    let fetchErr = null;
    try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const text = await resp.text();
        const s = text.indexOf('{'), e = text.lastIndexOf('}');
        if (s === -1) throw new Error('Bad response from Google Sheets');
        rows = JSON.parse(text.slice(s, e + 1)).table.rows;
    } catch(err) {
        fetchErr = err;
    }

    // ── Init GridStack (only on first load — skips if grid already exists) ────
    let gridErr = null;
    try {
        initGrid();
    } catch(err) {
        gridErr = err;
    }

    // ── Handle errors ────────────────────────────────────────────────────────
    if (gridErr) {
        document.getElementById('loadMsg').innerHTML =
            `<span style="color:var(--red)">&#10005; ${gridErr.message}</span>`;
        toast(gridErr.message, true);
        return;
    }
    if (fetchErr) {
        if (isFirstLoad) document.getElementById('loadOverlay').style.display = 'none';
        document.getElementById('ts').textContent = 'error';
        toast('Data load failed: ' + fetchErr.message, true);
        return;
    }

    // ── Success ───────────────────────────────────────────────────────────────
    const now = new Date();
    document.getElementById('ts').textContent =
        String(now.getHours()).padStart(2,'0') + ':' +
        String(now.getMinutes()).padStart(2,'0');

    try { renderAll(); } catch(err) { console.error('renderAll error:', err); }
    if (isFirstLoad) document.getElementById('loadOverlay').style.display = 'none';
    toast('Data refreshed', false);
}

// ── MILESTONE TIMELINE ────────────────────────────────────────────────────────
function renderMilestone() {
    const currentNW     = getFilterNW();
    const monthlyGrowth = getFilterMonthly();

    const milestones = [
        {name:'$50K', target:50000,  icon:'🎯'},
        {name:'$100K',target:100000, icon:'💯'},
        {name:'$150K',target:150000, icon:'🚀'},
        {name:'$250K',target:250000, icon:'⭐'},
        {name:'$500K',target:500000, icon:'💎'},
        {name:'$750K',target:750000, icon:'👑'},
        {name:'$1M',  target:1000000,icon:'🏆'},
    ];

    // Find the next milestone first (used for dots AND fill)
    const nextIdx = milestones.findIndex(m => currentNW < m.target);

    // Compute visual fill % aligned with evenly-spaced dot positions.
    // Dots are spaced 1/(n-1) apart visually but milestones are NOT evenly
    // distributed in $ value — so we interpolate within the current segment.
    const n = milestones.length;
    let visualPct;
    if (nextIdx === -1) {
        visualPct = 100; // past all milestones
    } else if (nextIdx === 0) {
        // Before the first milestone: scale from 0 to the 1st dot position
        visualPct = Math.max(0, (currentNW / milestones[0].target) * (100 / (n - 1)));
    } else {
        const prevM = milestones[nextIdx - 1];
        const nextM = milestones[nextIdx];
        const segFrac = (currentNW - prevM.target) / (nextM.target - prevM.target);
        visualPct = ((nextIdx - 1 + segFrac) / (n - 1)) * 100;
    }

    const fill = document.getElementById('ms-fill');
    if (fill) fill.style.width = visualPct + '%';

    const dots = milestones.map((m, i) => {
        const done = currentNW >= m.target;
        const isNext = i === nextIdx;
        let cls = done ? ' done' : (isNext ? ' next' : '');
        return `<div class="ms-circle${cls}" title="${m.name}">${done ? '✓' : m.icon}</div>`;
    }).join('');

    const labels = milestones.map(m => {
        const done = currentNW >= m.target;
        const months = (!done && monthlyGrowth > 0) ? Math.ceil((m.target - currentNW) / monthlyGrowth) : 0;
        const eta = done ? '' : (months > 0 ? months + 'mo' : '∞');
        const etaColor = done ? 'var(--green)' : (months > 0 && months < 24 ? 'var(--yellow)' : 'var(--text2)');
        return `<div class="ms-label">
            <div class="ms-name">${m.name}</div>
            <div class="ms-eta" style="color:${etaColor}">${eta}</div>
        </div>`;
    }).join('');

    gi('ms-dots', dots);
    gi('ms-labels', labels);

    const next = nextIdx >= 0 ? milestones[nextIdx] : null;
    const remainToNext = next ? next.target - currentNW : 0;
    const moToNext = (next && monthlyGrowth > 0) ? Math.ceil(remainToNext / monthlyGrowth) : 0;
    const nextStr = next
        ? ` &bull; Next: ${next.name} in ${moToNext > 0 ? moToNext + 'mo' : '∞'}`
        : ' &bull; 🏆 All milestones reached!';

    const actualPct = Math.min(100, (currentNW / 1000000) * 100);
    gi('ms-status', `NW: ${fd(currentNW)} &bull; ${actualPct.toFixed(1)}% of $1M goal${nextStr}`);
}

// ── MONTE CARLO FIRE ──────────────────────────────────────────────────────────
function renderMonteCarlo() {
    const statsEl = document.getElementById('mc-stats');
    if (!statsEl) return;

    const currentNW   = getFilterNW();
    const monthly     = getFilterMonthly();
    const atPct       = getFilterAtPct();
    const FIRE_TARGET = 1000000;
    const SIMS        = 800;
    const YEARS       = 15;

    if (currentNW <= 0) {
        gi('mc-stats', `<div style="color:var(--text2);text-align:center;padding:20px;grid-column:1/-1">Insufficient data for simulation</div>`);
        gi('mc-scenarios', '');
        return;
    }

    // Annual return: use AT return clamped sensibly
    const annualReturn = Math.max(0.04, Math.min(0.5, Math.abs(atPct > 0 ? atPct : 0.08)));
    const meanMonthly  = annualReturn / 12;
    const vol          = 0.045;  // 4.5% monthly volatility (crypto-heavy)

    // Run simulations, tracking yearly snapshots
    const tracks   = [];  // [sim][year 0..YEARS]
    const fireYrs  = [];
    for (let sim = 0; sim < SIMS; sim++) {
        let value  = currentNW;
        let fireYr = null;
        const track = [value];
        for (let mo = 0; mo < YEARS * 12; mo++) {
            const u1 = Math.random(), u2 = Math.random();
            const z  = Math.sqrt(-2 * Math.log(u1 || 1e-10)) * Math.cos(2 * Math.PI * u2);
            value = value * (1 + meanMonthly + z * vol) + monthly;
            if ((mo + 1) % 12 === 0) track.push(Math.max(0, value));
            if (value >= FIRE_TARGET && fireYr === null) fireYr = (mo + 1) / 12;
        }
        tracks.push(track);
        if (fireYr !== null) fireYrs.push(fireYr);
    }

    // Percentile helper
    function pct(arr, p) {
        const s = [...arr].sort((a, b) => a - b);
        return s[Math.floor(s.length * p)];
    }

    // Final values at YEARS
    const finals = tracks.map(t => t[YEARS]);
    const p10 = pct(finals, 0.10), p25 = pct(finals, 0.25);
    const p50 = pct(finals, 0.50), p75 = pct(finals, 0.75);
    const p90 = pct(finals, 0.90);
    const fireProb   = (fireYrs.length / SIMS * 100).toFixed(0);
    const medianFire = fireYrs.length > 0 ? pct(fireYrs, 0.5).toFixed(1) : '--';
    const bestFire   = fireYrs.length > 0 ? Math.min(...fireYrs).toFixed(1) : '--';

    // Stats boxes (8-box grid, 4 cols × 2 rows)
    gi('mc-stats', `
        <div class="mc-box"><div class="klbl">Bear (P10)</div><div class="kval neg">${fd(p10)}</div></div>
        <div class="mc-box"><div class="klbl">Cautious (P25)</div><div class="kval warn">${fd(p25)}</div></div>
        <div class="mc-box"><div class="klbl">Median (P50)</div><div class="kval pos">${fd(p50)}</div></div>
        <div class="mc-box"><div class="klbl">Bull (P90)</div><div class="kval" style="color:var(--accent)">${fd(p90)}</div></div>
        <div class="mc-box"><div class="klbl">FIRE Probability</div><div class="kval ${parseFloat(fireProb)>50?'pos':'warn'}">${fireProb}%</div></div>
        <div class="mc-box"><div class="klbl">Median FIRE</div><div class="kval">${medianFire === '--' ? '—' : medianFire + ' yrs'}</div></div>
        <div class="mc-box"><div class="klbl">Best-Case FIRE</div><div class="kval pos">${bestFire === '--' ? '—' : bestFire + ' yrs'}</div></div>
        <div class="mc-box"><div class="klbl">Simulations</div><div class="kval">${SIMS.toLocaleString()}</div></div>
    `);

    // Scenarios panel
    const bearAnnual = Math.max(0.01, annualReturn * 0.4);
    const bullAnnual = Math.min(0.6,  annualReturn * 1.8);
    function projFinal(ar) {
        let v = currentNW;
        const mm = ar / 12;
        for (let mo = 0; mo < YEARS * 12; mo++) v = v * (1 + mm) + monthly;
        return v;
    }
    gi('mc-scenarios', `
        <div class="mc-scenario">
            <div class="mc-scenario-title" style="color:var(--red)">🐻 Bear (${(bearAnnual*100).toFixed(0)}%/yr)</div>
            <div class="mc-scenario-val">Final: <b>${fd(projFinal(bearAnnual))}</b></div>
        </div>
        <div class="mc-scenario">
            <div class="mc-scenario-title" style="color:var(--green)">📈 Base (${(annualReturn*100).toFixed(0)}%/yr)</div>
            <div class="mc-scenario-val">Final: <b>${fd(projFinal(annualReturn))}</b></div>
        </div>
        <div class="mc-scenario">
            <div class="mc-scenario-title" style="color:var(--accent)">🚀 Bull (${(bullAnnual*100).toFixed(0)}%/yr)</div>
            <div class="mc-scenario-val">Final: <b>${fd(projFinal(bullAnnual))}</b></div>
        </div>
    `);

    gi('mc-footer', `${YEARS}-yr horizon &bull; Monthly contrib: ${fd(monthly)} &bull; Base return: ~${(annualReturn*100).toFixed(0)}%/yr &bull; Vol: 4.5%/mo`);
    gi('mc-params', `Target $1M`);

    // Fan chart: percentile bands over years
    const yearLabels = Array.from({length: YEARS + 1}, (_, i) => i === 0 ? 'Now' : `Y${i}`);
    const p10s = yearLabels.map((_, yi) => pct(tracks.map(t => t[yi]), 0.10));
    const p50s = yearLabels.map((_, yi) => pct(tracks.map(t => t[yi]), 0.50));
    const p90s = yearLabels.map((_, yi) => pct(tracks.map(t => t[yi]), 0.90));
    const fireTargetLine = yearLabels.map(() => FIRE_TARGET);

    if (charts.monte) charts.monte.destroy();
    const ctx = document.getElementById('mcChart');
    if (ctx) {
        charts.monte = new Chart(ctx, {
            type: 'line',
            data: {
                labels: yearLabels,
                datasets: [
                    {
                        label: 'P90 (Bull)',
                        data: p90s,
                        borderColor: 'rgba(124,111,239,.8)',
                        backgroundColor: 'rgba(124,111,239,.12)',
                        fill: '+1',
                        borderWidth: 1.5,
                        pointRadius: 0,
                        tension: 0.4,
                    },
                    {
                        label: 'P50 (Median)',
                        data: p50s,
                        borderColor: '#00c896',
                        backgroundColor: 'rgba(0,200,150,.08)',
                        fill: '+1',
                        borderWidth: 2.5,
                        pointRadius: 0,
                        tension: 0.4,
                    },
                    {
                        label: 'P10 (Bear)',
                        data: p10s,
                        borderColor: 'rgba(255,77,109,.7)',
                        backgroundColor: 'transparent',
                        fill: false,
                        borderWidth: 1.5,
                        borderDash: [4, 3],
                        pointRadius: 0,
                        tension: 0.4,
                    },
                    {
                        label: '$1M FIRE Target',
                        data: fireTargetLine,
                        borderColor: 'rgba(255,184,77,.6)',
                        backgroundColor: 'transparent',
                        fill: false,
                        borderWidth: 1,
                        borderDash: [6, 4],
                        pointRadius: 0,
                    },
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        display: true,
                        position: 'bottom',
                        labels: { color: '#7b82a0', font: { size: 10 }, boxWidth: 12, padding: 8 }
                    },
                    tooltip: {
                        callbacks: {
                            label: ctx => ` ${ctx.dataset.label}: ${fd(ctx.raw)}`
                        }
                    }
                },
                scales: {
                    x: { ticks: { color: '#7b82a0', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.04)' } },
                    y: {
                        ticks: {
                            color: '#7b82a0',
                            maxTicksLimit: 5,
                            callback: v => v >= 1e6 ? '$' + (v/1e6).toFixed(1) + 'M' : v >= 1e3 ? '$' + (v/1e3).toFixed(0) + 'k' : '$' + v
                        },
                        grid: { color: 'rgba(255,255,255,.05)' }
                    }
                }
            }
        });
    }
}

// ── ASSETS ────────────────────────────────────────────────────────────────────
function renderAssets() {
    const assets=[];
    for(let i=81;i<=92;i++){
        const name=V(i,0); if(!name)continue;
        assets.push({name,qty:N(i,1),val:N(i,2),type:V(i,3)||'',plat:V(i,4)||'',status:V(i,5)||''});
    }
    const COLORS=['#7c6fef','#00d4ff','#b066ff','#00c896','#ffb84d','#ff4d6d','#7b82a0','#4a5070','#1c3a5e','#2d5a27','#5e3a1c','#5e1c3a'];
    if(charts.assets)charts.assets.destroy();
    const ctx=document.getElementById('assetsChart');
    if(ctx){
        charts.assets=new Chart(ctx,{
            type:'doughnut',
            data:{labels:assets.map(a=>`${a.name} (${a.plat})`),datasets:[{data:assets.map(a=>a.val),backgroundColor:COLORS,borderWidth:1,borderColor:'rgba(255,255,255,.05)'}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#7b82a0',font:{size:10},padding:8,boxWidth:10}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${fd(ctx.raw)}`}}}}
        });
    }
    const tbody=assets.map(a=>`<tr><td><b>${a.name}</b></td><td>${fq(a.qty)}</td><td class="sensitive">${fd(a.val)}</td><td>${a.type}</td><td>${a.plat}</td><td>${a.status}</td></tr>`).join('');
    gi('assetsTable',`<table><thead><tr><th>Asset</th><th>Qty</th><th>Value</th><th>Type</th><th>Platform</th><th>Status</th></tr></thead><tbody>${tbody}</tbody></table>`);
}

// ── YEARLY PERFORMANCE ────────────────────────────────────────────────────────
function renderYearly() {
    const years=[];
    for(let i=95;i<=98;i++){const yr=V(i,0);if(!yr)continue;years.push({yr,nw:N(i,1),yoy:V(i,2)||'—',ta:N(i,3),btc:N(i,4)});}
    if(charts.year)charts.year.destroy();
    const ctx=document.getElementById('yearChart');
    if(ctx){
        charts.year=new Chart(ctx,{
            type:'bar',
            data:{labels:years.map(y=>y.yr),datasets:[{label:'Net Worth',data:years.map(y=>y.nw),backgroundColor:'#7c6fef',borderRadius:4},{label:'Total Assets',data:years.map(y=>y.ta),backgroundColor:'rgba(0,212,255,.35)',borderColor:'#00d4ff',borderWidth:1,borderRadius:4}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7b82a0',font:{size:11}}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fd(ctx.raw)}`}}},scales:{x:{ticks:{color:'#7b82a0'},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#7b82a0',callback:v=>'$'+(v>=1000?(v/1000).toFixed(0)+'k':v)},grid:{color:'rgba(255,255,255,.05)'}}}}
        });
    }
    const tbody=years.map(y=>`<tr><td><b>${y.yr}</b></td><td class="sensitive">${fd(y.nw)}</td><td>${typeof y.yoy==='number'?(y.yoy===0?'—':fp(y.yoy)):y.yoy}</td><td class="sensitive">${fd(y.ta)}</td><td>${fq(y.btc)} &#x20bf;</td></tr>`).join('');
    gi('yearTable',`<table><thead><tr><th>Year</th><th>Net Worth</th><th>YoY</th><th>Total Assets</th><th>BTC</th></tr></thead><tbody>${tbody}</tbody></table>`);
}

// ─────────────────────────────────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────────────────────────────────
function setFilter(el) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    activeFilter = el.dataset.filter;
    document.body.dataset.filter = activeFilter; // drives CSS filter-colour rules
    if (rows.length > 0) {
        updateSectorHeaders();
        renderSummary(); renderDebt(); renderProjections();
        renderVelocity(); renderMilestone(); renderMonteCarlo(); renderYearly();
    }
}

function doRefresh() {
    // Do NOT null-out grid — that triggers re-creation and widget duplication.
    // Just clear cached rows and re-fetch; initGrid() skips if grid exists.
    rows = [];
    loadData();
}

function applyLock(lock, save) {
    isLocked = lock;
    const btn = document.getElementById('lockBtn');
    if (lock) {
        // Lock: disable all movement and save layout
        if (grid) { grid.enableMove(false); grid.enableResize(false); }
        if (editMode) { editMode = false; document.body.classList.remove('editing'); const eb = document.getElementById('editBtn'); if(eb) eb.classList.remove('on'); }
        if (btn) { btn.textContent = '\uD83D\uDD12 Locked'; btn.classList.add('lock-on'); }
        saveLayout();
    } else {
        // Unlock: re-enable movement
        if (grid) { grid.enableMove(true); grid.enableResize(true); }
        if (btn) { btn.textContent = '\uD83D\uDD13 Unlocked'; btn.classList.remove('lock-on'); }
    }
    if (save) localStorage.setItem(LS.locked, lock ? 'true' : 'false');
}

function toggleLock() { applyLock(!isLocked, true); }

function toggleEdit() {
    if (isLocked) { toast('Unlock layout first', true); return; }
    editMode = !editMode;
    document.body.classList.toggle('editing', editMode);
    document.getElementById('editBtn').classList.toggle('on', editMode);
    if (!editMode) { saveLayout(); toast('Layout saved', false); }
}

function togglePrivacy() {
    privacyOn = !privacyOn;
    document.body.classList.toggle('privacy', privacyOn);
    document.getElementById('privacyBtn').classList.toggle('on', privacyOn);
    localStorage.setItem(LS.privacy, privacyOn ? '1' : '0');
}

function setTheme(t) {
    document.body.className = document.body.className.replace(/theme-\w+/g,'').trim();
    if (t !== 'zhodler') document.body.classList.add('theme-' + t);
    document.querySelectorAll('.tpill').forEach(p => {
        const isActive = p.dataset.t === t;
        p.classList.toggle('active', isActive);
        p.setAttribute('aria-checked', isActive ? 'true' : 'false');
    });
    localStorage.setItem(LS.theme, t);
    if (rows.length > 0) { renderAssets(); renderYearly(); renderMonteCarlo(); }
}

function openSettings() {
    document.getElementById('sheetInput').value = localStorage.getItem(LS.sheet) || DEFAULT_SHEET;
    document.getElementById('modal').classList.add('open');
}
function closeSettings() { document.getElementById('modal').classList.remove('open'); }
function saveAndReload() {
    const raw = document.getElementById('sheetInput').value.trim();
    if (!raw) return;
    const m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
    localStorage.setItem(LS.sheet, m ? m[1] : raw);
    closeSettings();
    rows = [];
    loadData();
}
document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal'))closeSettings(); });

function toast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + (isErr ? 'err' : 'ok');
    clearTimeout(t._tid);
    t._tid = setTimeout(() => { t.className = ''; }, 3000);
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
(function init() {
    const theme = localStorage.getItem(LS.theme) || 'zhodler';
    setTheme(theme);
    if (localStorage.getItem(LS.privacy) === '1') togglePrivacy();
    loadData();
})();
</script>
